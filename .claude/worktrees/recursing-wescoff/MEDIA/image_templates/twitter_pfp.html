<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px;
  height: 400px;
  background: #080d14;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.circle {
  width: 340px;
  height: 340px;
  border-radius: 50%;
  border: 3px solid #3a7abf;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(135deg, #0f1520 0%, #080d14 100%);
}
.monogram {
  font-size: 120px;
  font-weight: 900;
  color: #d8e4f0;
  letter-spacing: -6px;
  line-height: 1;
}
.sub {
  font-size: 14px;
  color: #3a7abf;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 4px;
}
</style>
</head>
<body>
<div class="circle">
  <div class="monogram">PM</div>
  <div class="sub">MAXXER</div>
</div>
</body>
</html>
