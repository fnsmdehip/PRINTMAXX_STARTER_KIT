<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 50%, #0a0a0a 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
    position: relative;
  }
  .grid-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(102,126,234,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(102,126,234,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .big-number {
    font-size: 120px;
    font-weight: 900;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #667eea 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    letter-spacing: -4px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .context {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
    max-width: 900px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .detail {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    max-width: 700px;
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }
  .brand {
    position: absolute;
    bottom: 35px;
    right: 55px;
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.15);
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 1;
  }
  .glow {
    position: absolute;
    top: 50%;
    left: -80px;
    transform: translateY(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(102,126,234,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="glow"></div>
  <div class="big-number">340</div>
  <div class="context">customers from reddit. zero ad spend.</div>
  <div class="detail">the trick is not marketing at all. just be useful in the right threads.</div>
  <div class="brand">PRINTMAXX</div>
</body>
</html>
