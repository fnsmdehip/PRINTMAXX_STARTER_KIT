# Lint and Test Workflow
# Runs on all PRs and pushes
# Handles cross-platform linting and shared code tests

name: Lint & Test

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: lint-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which platforms have changes
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
      shared: ${{ steps.filter.outputs.shared }}
      web: ${{ steps.filter.outputs.web }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ios:
              - 'ios/**'
              - 'shared/**'
            android:
              - 'android/**'
              - 'shared/**'
            shared:
              - 'shared/**'
              - 'src/**'
            web:
              - 'web/**'
              - 'src/**'

  # TypeScript/JavaScript linting
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format github-actions

      - name: Run Prettier check
        run: npm run format:check

      - name: Run TypeScript check
        run: npm run type-check

  # Swift linting
  lint-swift:
    name: Lint Swift
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd ios
          swiftlint lint --reporter github-actions-logging --strict

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check Swift formatting
        run: |
          cd ios
          swiftformat --lint .

  # Kotlin linting
  lint-kotlin:
    name: Lint Kotlin
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.1.0/ktlint
          chmod a+x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Run ktlint
        run: |
          cd android
          ktlint --reporter=plain?group_by_file --reporter=checkstyle,output=build/ktlint-report.xml "**/*.kt" "**/*.kts"

      - name: Upload ktlint results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ktlint-results
          path: android/build/ktlint-report.xml

  # Unit tests for shared code
  test-shared:
    name: Test Shared Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports/junit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shared-test-results
          path: reports/junit/

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Shared Unit Tests
          path: reports/junit/*.xml
          reporter: jest-junit

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # Dependency review
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # Summary job
  lint-test-summary:
    name: Lint & Test Summary
    runs-on: ubuntu-latest
    needs: [lint-typescript, lint-swift, lint-kotlin, test-shared, security-scan]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint-typescript.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-swift.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-kotlin.result }}" == "failure" ]] || \
             [[ "${{ needs.test-shared.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped"

      - name: Post summary
        run: |
          echo "## Lint & Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Lint | ${{ needs.lint-typescript.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Swift Lint | ${{ needs.lint-swift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kotlin Lint | ${{ needs.lint-kotlin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shared Tests | ${{ needs.test-shared.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
