<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#1a1a2e"/>

  <!-- Islamic geometric tile pattern overlay -->
  <defs>
    <pattern id="islamic" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#0d9488" stroke-width="0.8" opacity="0.15">
        <path d="M40 0 L80 40 L40 80 L0 40 Z"/>
        <path d="M40 20 L60 40 L40 60 L20 40 Z"/>
      </g>
    </pattern>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#islamic)"/>

  <!-- Outer glow ring -->
  <circle cx="512" cy="440" r="275" fill="none" stroke="#0d9488" stroke-width="3" opacity="0.2"/>
  <circle cx="512" cy="440" r="250" fill="none" stroke="#0d9488" stroke-width="6" opacity="0.35"/>

  <!-- Clock/timer face -->
  <circle cx="512" cy="440" r="225" fill="#12121f" stroke="#0d9488" stroke-width="8"/>

  <!-- Clock tick marks (12 positions) -->
  <g stroke="#d4a574" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="512" y1="240" x2="512" y2="265"/>
    <line x1="624" y1="272" x2="612" y2="291"/>
    <line x1="703" y1="352" x2="687" y2="361"/>
    <line x1="737" y1="440" x2="712" y2="440"/>
    <line x1="703" y1="528" x2="687" y2="519"/>
    <line x1="624" y1="608" x2="612" y2="589"/>
    <line x1="512" y1="640" x2="512" y2="615"/>
    <line x1="400" y1="608" x2="412" y2="589"/>
    <line x1="321" y1="528" x2="337" y2="519"/>
    <line x1="287" y1="440" x2="312" y2="440"/>
    <line x1="321" y1="352" x2="337" y2="361"/>
    <line x1="400" y1="272" x2="412" y2="291"/>
  </g>

  <!-- Hour hand -->
  <line x1="512" y1="440" x2="512" y2="320" stroke="#eeeef4" stroke-width="10" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 3 o'clock → prayer time) -->
  <line x1="512" y1="440" x2="620" y2="440" stroke="#0d9488" stroke-width="8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="512" cy="440" r="12" fill="#0d9488"/>
  <circle cx="512" cy="440" r="6" fill="#1a1a2e"/>

  <!-- Crescent moon top-right -->
  <circle cx="680" cy="240" r="55" fill="#d4a574" opacity="0.95"/>
  <circle cx="705" cy="222" r="46" fill="#1a1a2e"/>

  <!-- Star next to crescent -->
  <polygon points="740,195 745,208 759,208 748,217 752,230 740,222 728,230 732,217 721,208 735,208" fill="#d4a574" opacity="0.9"/>

  <!-- Streak fire indicator -->
  <text x="512" y="710" font-family="system-ui,-apple-system,sans-serif" font-size="48" text-anchor="middle">🔥</text>
  <text x="512" y="756" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="2">30 DAY STREAK</text>

  <!-- App name -->
  <text x="512" y="880" font-family="system-ui,-apple-system,sans-serif" font-size="70" font-weight="800" fill="#0d9488" text-anchor="middle" letter-spacing="-1">PrayerLock</text>
</svg>
