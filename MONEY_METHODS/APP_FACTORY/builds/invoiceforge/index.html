<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InvoiceForge">
<meta name="description" content="Generate professional invoices in seconds. Auto-calculated totals, tax, PDF export, payment tracking. Free for freelancers.">
<meta property="og:title" content="InvoiceForge - Invoice Generator">
<meta property="og:description" content="Professional invoices in seconds. Auto-calc totals, PDF export, payment tracking, recurring templates. Free PWA.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="InvoiceForge - Invoice Generator">
<meta name="twitter:description" content="Professional invoices in seconds. PDF export, payment tracking. Free PWA for freelancers.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230c0c18' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50'>📄</text></svg>">
<title>InvoiceForge - Professional Invoice Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c18;--bg2:#141422;--bg3:#1c1c30;--bg4:#262642;
  --text:#eeeef4;--text2:#9898b8;--text3:#5e5e7a;
  --accent:#10b981;--accent2:#34d399;--accent3:#059669;
  --blue:#3b82f6;--red:#ef4444;--orange:#f59e0b;--purple:#a855f7;
  --radius:14px;--radius-sm:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--accent2)}
.header-actions{display:flex;gap:8px}

.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent2)}

.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 100px}
.main::-webkit-scrollbar{display:none}

.section{padding:20px}
.section+.section{border-top:1px solid rgba(255,255,255,.04)}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:14px}

.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.input-group input,.input-group textarea,.input-group select{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{border-color:var(--accent)}
.input-group select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%239898b8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center}
.input-group select option{background:var(--bg2);color:var(--text)}

.row{display:flex;gap:10px}
.row .input-group{flex:1}

.btn{width:100%;padding:14px;border-radius:var(--radius);border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent3)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid rgba(255,255,255,.08)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent2)}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;border-radius:8px}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}

/* Line Items */
.line-item{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;animation:fadeUp .2s ease}
.line-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.line-item-number{font-size:11px;font-weight:600;color:var(--text3)}
.line-item-remove{color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;border:none;background:none;font-family:inherit}
.line-item-remove:hover{color:var(--red)}
.line-item .row{margin-bottom:0}
.line-item .input-group{margin-bottom:8px}
.line-item .input-group:last-child{margin-bottom:0}
.line-total{text-align:right;font-size:14px;font-weight:600;color:var(--accent2);margin-top:6px}

/* Invoice Preview */
.invoice-preview{background:#fff;color:#1a1a2e;border-radius:var(--radius);padding:32px 24px;margin-bottom:16px}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.inv-title{font-size:28px;font-weight:800;color:#1a1a2e;letter-spacing:-.5px}
.inv-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.inv-badge-draft{background:#fef3c7;color:#92400e}
.inv-badge-sent{background:#dbeafe;color:#1e40af}
.inv-badge-paid{background:#d1fae5;color:#065f46}
.inv-badge-overdue{background:#fee2e2;color:#991b1b}
.inv-parties{display:flex;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.inv-party{flex:1;min-width:160px}
.inv-party-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:6px}
.inv-party-name{font-size:16px;font-weight:700;color:#1a1a2e}
.inv-party-detail{font-size:13px;color:#6b7280;line-height:1.5}
.inv-meta{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.inv-meta-item{font-size:13px;color:#6b7280}
.inv-meta-item strong{color:#1a1a2e;display:block;font-size:14px}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.inv-table th{text-align:left;padding:10px 12px;border-bottom:2px solid #e5e7eb;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af}
.inv-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:14px;color:#374151}
.inv-table .right{text-align:right}
.inv-totals{display:flex;flex-direction:column;align-items:flex-end;margin-bottom:20px}
.inv-total-row{display:flex;justify-content:space-between;width:200px;padding:6px 0;font-size:14px;color:#6b7280}
.inv-total-row.grand{font-size:18px;font-weight:700;color:#1a1a2e;border-top:2px solid #e5e7eb;padding-top:10px;margin-top:4px}
.inv-pay-btn{display:block;width:100%;padding:14px;background:#10b981;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;transition:background .15s}
.inv-pay-btn:hover{background:#059669}
.inv-footer{text-align:center;margin-top:20px;font-size:12px;color:#9ca3af}

/* Tracker */
.tracker-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.tracker-card:hover{border-color:var(--accent)}
.tracker-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tracker-card-title{font-size:15px;font-weight:600}
.tracker-card-amount{font-size:15px;font-weight:700;color:var(--accent2)}
.tracker-card-meta{font-size:12px;color:var(--text3);display:flex;gap:12px}
.tracker-card-status{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase}
.status-draft{background:rgba(245,158,11,.12);color:var(--orange)}
.status-sent{background:rgba(59,130,246,.12);color:var(--blue)}
.status-paid{background:rgba(16,185,129,.12);color:var(--accent2)}
.status-overdue{background:rgba(239,68,68,.12);color:var(--red)}
.tracker-card-actions{display:flex;gap:6px;margin-top:8px}

/* Stats */
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{flex:1;min-width:100px;background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:14px}
.stat-value{font-size:20px;font-weight:800;letter-spacing:-.3px}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}

/* Templates */
.template-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.template-card:hover{border-color:var(--accent)}
.template-card-name{font-size:14px;font-weight:600;margin-bottom:2px}
.template-card-desc{font-size:12px;color:var(--text3)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg);border-top:1px solid rgba(255,255,255,.06);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;color:var(--text3);transition:color .15s;border:none;background:none;font-family:inherit}
.nav-item.active{color:var(--accent2)}
.nav-item svg{width:20px;height:20px}
.nav-item span{font-size:10px;font-weight:500}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state p{font-size:14px;line-height:1.6}

.privacy-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.privacy-overlay.show{display:flex}
.privacy-content{background:var(--bg2);border-radius:var(--radius);padding:24px;max-width:500px;max-height:80vh;overflow-y:auto;width:100%}
.privacy-content h2{font-size:18px;font-weight:700;margin-bottom:12px}
.privacy-content p{font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:10px}

.view{display:none}
.view.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:640px){.main{max-width:600px;margin:0 auto}}
@media print{
  .header,.bottom-nav,.btn-row,.tracker-card-actions{display:none!important}
  .main{overflow:visible!important;padding:0!important}
  .invoice-preview{box-shadow:none;border:none}
  body{background:#fff!important;color:#1a1a2e!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Invoice<span>Forge</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="btnNewInvoice" aria-label="New Invoice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="main" id="mainScroll">
    <!-- Create View -->
    <div class="view active" id="viewCreate">
      <div class="section">
        <div class="section-title">From (Your Business)</div>
        <div class="input-group">
          <label>Business Name</label>
          <input type="text" id="inputBizName" placeholder="e.g. Alex Design Studio" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Email (optional)</label>
          <input type="email" id="inputBizEmail" placeholder="hello@example.com" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Address (optional)</label>
          <input type="text" id="inputBizAddress" placeholder="123 Main St, City, State" autocomplete="off">
        </div>
      </div>
      <div class="section">
        <div class="section-title">Bill To (Client)</div>
        <div class="input-group">
          <label>Client Name</label>
          <input type="text" id="inputClientName" placeholder="e.g. Acme Corp" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Client Email (optional)</label>
          <input type="email" id="inputClientEmail" placeholder="client@example.com" autocomplete="off">
        </div>
      </div>
      <div class="section">
        <div class="section-title">Invoice Details</div>
        <div class="row">
          <div class="input-group">
            <label>Invoice Number</label>
            <input type="text" id="inputInvNumber" autocomplete="off">
          </div>
          <div class="input-group">
            <label>Due Date</label>
            <input type="date" id="inputDueDate">
          </div>
        </div>
        <div class="row">
          <div class="input-group">
            <label>Tax Rate %</label>
            <input type="number" id="inputTaxRate" value="0" min="0" max="100" step="0.5">
          </div>
          <div class="input-group">
            <label>Currency</label>
            <select id="inputCurrency">
              <option value="USD">USD ($)</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="CAD">CAD</option>
              <option value="AUD">AUD</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Stripe Payment Link (optional)</label>
          <input type="url" id="inputStripeLink" placeholder="https://buy.stripe.com/..." autocomplete="off">
        </div>
      </div>
      <div class="section">
        <div class="section-title">Line Items</div>
        <div id="lineItemsContainer"></div>
        <button class="btn btn-secondary btn-sm" id="btnAddLine" style="margin-bottom:14px">+ Add Line Item</button>
        <div id="runningTotal" style="text-align:right;font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:14px"></div>
        <button class="btn btn-primary" id="btnPreview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Preview Invoice
        </button>
      </div>
    </div>

    <!-- Preview View -->
    <div class="view" id="viewPreview">
      <div class="section" id="previewOutput"></div>
      <div class="section">
        <div class="btn-row">
          <button class="btn btn-primary" id="btnSaveInvoice">Save Invoice</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btnPrintInvoice">Export PDF</button>
          <button class="btn btn-secondary" id="btnEditInvoice">Edit</button>
        </div>
      </div>
    </div>

    <!-- Tracker View -->
    <div class="view" id="viewTracker">
      <div class="section">
        <div id="trackerStats"></div>
        <div class="section-title">All Invoices</div>
        <div id="trackerList"></div>
      </div>
    </div>

    <!-- Templates View -->
    <div class="view" id="viewTemplates">
      <div class="section">
        <div class="section-title">Recurring Templates</div>
        <div id="templateList"></div>
        <button class="btn btn-secondary" id="btnSaveTemplate" style="margin-top:12px">Save Current as Template</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" data-view="viewCreate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Create</span>
    </button>
    <button class="nav-item" data-view="viewTracker">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Invoices</span>
    </button>
    <button class="nav-item" data-view="viewTemplates">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      <span>Templates</span>
    </button>
  </div>

  <div class="toast" id="toast"></div>
  <div class="privacy-overlay" id="privacyOverlay">
    <div class="privacy-content" id="privacyContent"></div>
  </div>
</div>

<script>
(function(){
'use strict';

var CURRENCY_SYMBOLS = {USD:'$',EUR:'E',GBP:'L',CAD:'C$',AUD:'A$'};

// ===== DOM HELPERS =====
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (k === 'className') e.className = attrs[k];
      else if (k === 'textContent') e.textContent = attrs[k];
      else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    for (var i = 0; i < children.length; i++) {
      if (typeof children[i] === 'string') e.appendChild(document.createTextNode(children[i]));
      else if (children[i]) e.appendChild(children[i]);
    }
  }
  return e;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function fmt(num, currency) {
  var sym = CURRENCY_SYMBOLS[currency] || '$';
  return sym + parseFloat(num || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ===== LINE ITEMS =====
var lineItemCount = 0;

function addLineItem(desc, qty, rate) {
  lineItemCount++;
  var container = document.getElementById('lineItemsContainer');
  var item = el('div', {className: 'line-item', id: 'line-' + lineItemCount});

  var header = el('div', {className: 'line-item-header'});
  header.appendChild(el('span', {className: 'line-item-number', textContent: 'Item #' + lineItemCount}));
  var removeBtn = el('button', {className: 'line-item-remove', textContent: 'x'});
  (function(itemEl){
    removeBtn.addEventListener('click', function(){ itemEl.remove(); updateRunningTotal(); });
  })(item);
  header.appendChild(removeBtn);
  item.appendChild(header);

  var g1 = el('div', {className: 'input-group'});
  g1.appendChild(el('label', {textContent: 'Description'}));
  var descInput = el('input', {type: 'text', placeholder: 'e.g. Website redesign', className: 'line-desc', autocomplete: 'off'});
  if (desc) descInput.value = desc;
  descInput.addEventListener('input', updateRunningTotal);
  g1.appendChild(descInput);
  item.appendChild(g1);

  var row = el('div', {className: 'row'});
  var g2 = el('div', {className: 'input-group'});
  g2.appendChild(el('label', {textContent: 'Qty'}));
  var qtyInput = el('input', {type: 'number', value: qty || '1', min: '0', step: '1', className: 'line-qty'});
  qtyInput.addEventListener('input', updateRunningTotal);
  g2.appendChild(qtyInput);
  row.appendChild(g2);

  var g3 = el('div', {className: 'input-group'});
  g3.appendChild(el('label', {textContent: 'Rate'}));
  var rateInput = el('input', {type: 'number', placeholder: '0.00', min: '0', step: '0.01', className: 'line-rate'});
  if (rate) rateInput.value = rate;
  rateInput.addEventListener('input', updateRunningTotal);
  g3.appendChild(rateInput);
  row.appendChild(g3);
  item.appendChild(row);

  var totalDiv = el('div', {className: 'line-total', textContent: '$0.00'});
  item.appendChild(totalDiv);

  container.appendChild(item);
  updateRunningTotal();
}

function getLineItems() {
  var items = [];
  var lineEls = document.querySelectorAll('.line-item');
  for (var i = 0; i < lineEls.length; i++) {
    var desc = lineEls[i].querySelector('.line-desc').value.trim();
    var qty = parseFloat(lineEls[i].querySelector('.line-qty').value) || 0;
    var rate = parseFloat(lineEls[i].querySelector('.line-rate').value) || 0;
    items.push({description: desc || 'Item', quantity: qty, rate: rate, total: qty * rate});
  }
  return items;
}

function updateRunningTotal() {
  var items = getLineItems();
  var subtotal = 0;
  var currency = document.getElementById('inputCurrency').value;

  // Update per-line totals
  var lineEls = document.querySelectorAll('.line-item');
  for (var i = 0; i < lineEls.length; i++) {
    var qty = parseFloat(lineEls[i].querySelector('.line-qty').value) || 0;
    var rate = parseFloat(lineEls[i].querySelector('.line-rate').value) || 0;
    var lt = qty * rate;
    subtotal += lt;
    lineEls[i].querySelector('.line-total').textContent = fmt(lt, currency);
  }

  var tax = parseFloat(document.getElementById('inputTaxRate').value) || 0;
  var taxAmt = subtotal * (tax / 100);
  var total = subtotal + taxAmt;

  var rt = document.getElementById('runningTotal');
  rt.textContent = 'Subtotal: ' + fmt(subtotal, currency) + (tax > 0 ? ' | Tax: ' + fmt(taxAmt, currency) : '') + ' | Total: ' + fmt(total, currency);
}

// ===== PREVIEW =====
function buildPreview() {
  var bizName = document.getElementById('inputBizName').value.trim();
  var bizEmail = document.getElementById('inputBizEmail').value.trim();
  var bizAddress = document.getElementById('inputBizAddress').value.trim();
  var clientName = document.getElementById('inputClientName').value.trim();
  var clientEmail = document.getElementById('inputClientEmail').value.trim();
  var invNumber = document.getElementById('inputInvNumber').value.trim();
  var dueDate = document.getElementById('inputDueDate').value;
  var taxRate = parseFloat(document.getElementById('inputTaxRate').value) || 0;
  var currency = document.getElementById('inputCurrency').value;
  var stripeLink = document.getElementById('inputStripeLink').value.trim();
  var items = getLineItems();

  if (!bizName || !clientName || items.length === 0) {
    showToast('Fill in business name, client name, and add items');
    return;
  }

  var subtotal = 0;
  for (var i = 0; i < items.length; i++) subtotal += items[i].total;
  var taxAmt = subtotal * (taxRate / 100);
  var total = subtotal + taxAmt;

  var output = document.getElementById('previewOutput');
  output.textContent = '';

  var inv = el('div', {className: 'invoice-preview'});

  // Header
  var invHeader = el('div', {className: 'inv-header'});
  invHeader.appendChild(el('div', {className: 'inv-title', textContent: 'INVOICE'}));
  invHeader.appendChild(el('span', {className: 'inv-badge inv-badge-draft', textContent: 'Draft'}));
  inv.appendChild(invHeader);

  // Parties
  var parties = el('div', {className: 'inv-parties'});
  var fromParty = el('div', {className: 'inv-party'});
  fromParty.appendChild(el('div', {className: 'inv-party-label', textContent: 'From'}));
  fromParty.appendChild(el('div', {className: 'inv-party-name', textContent: bizName}));
  if (bizEmail) fromParty.appendChild(el('div', {className: 'inv-party-detail', textContent: bizEmail}));
  if (bizAddress) fromParty.appendChild(el('div', {className: 'inv-party-detail', textContent: bizAddress}));
  parties.appendChild(fromParty);

  var toParty = el('div', {className: 'inv-party'});
  toParty.appendChild(el('div', {className: 'inv-party-label', textContent: 'Bill To'}));
  toParty.appendChild(el('div', {className: 'inv-party-name', textContent: clientName}));
  if (clientEmail) toParty.appendChild(el('div', {className: 'inv-party-detail', textContent: clientEmail}));
  parties.appendChild(toParty);
  inv.appendChild(parties);

  // Meta
  var meta = el('div', {className: 'inv-meta'});
  if (invNumber) {
    var m1 = el('div', {className: 'inv-meta-item'});
    m1.appendChild(document.createTextNode('Invoice #'));
    m1.appendChild(el('strong', {textContent: invNumber}));
    meta.appendChild(m1);
  }
  if (dueDate) {
    var m2 = el('div', {className: 'inv-meta-item'});
    m2.appendChild(document.createTextNode('Due Date'));
    var dd = new Date(dueDate + 'T00:00:00');
    m2.appendChild(el('strong', {textContent: dd.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}));
    meta.appendChild(m2);
  }
  var m3 = el('div', {className: 'inv-meta-item'});
  m3.appendChild(document.createTextNode('Issued'));
  m3.appendChild(el('strong', {textContent: new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}));
  meta.appendChild(m3);
  inv.appendChild(meta);

  // Table
  var table = el('table', {className: 'inv-table'});
  var thead = el('thead');
  var hRow = el('tr');
  ['Description', 'Qty', 'Rate', 'Amount'].forEach(function(h, idx){
    var th = el('th', {textContent: h});
    if (idx >= 1) th.className = 'right';
    hRow.appendChild(th);
  });
  thead.appendChild(hRow);
  table.appendChild(thead);

  var tbody = el('tbody');
  for (var j = 0; j < items.length; j++) {
    var row = el('tr');
    row.appendChild(el('td', {textContent: items[j].description}));
    var tdq = el('td', {textContent: items[j].quantity.toString(), className: 'right'});
    row.appendChild(tdq);
    var tdr = el('td', {textContent: fmt(items[j].rate, currency), className: 'right'});
    row.appendChild(tdr);
    var tda = el('td', {textContent: fmt(items[j].total, currency), className: 'right'});
    row.appendChild(tda);
    tbody.appendChild(row);
  }
  table.appendChild(tbody);
  inv.appendChild(table);

  // Totals
  var totals = el('div', {className: 'inv-totals'});
  var subRow = el('div', {className: 'inv-total-row'});
  subRow.appendChild(el('span', {textContent: 'Subtotal'}));
  subRow.appendChild(el('span', {textContent: fmt(subtotal, currency)}));
  totals.appendChild(subRow);

  if (taxRate > 0) {
    var taxRow = el('div', {className: 'inv-total-row'});
    taxRow.appendChild(el('span', {textContent: 'Tax (' + taxRate + '%)'}));
    taxRow.appendChild(el('span', {textContent: fmt(taxAmt, currency)}));
    totals.appendChild(taxRow);
  }

  var grandRow = el('div', {className: 'inv-total-row grand'});
  grandRow.appendChild(el('span', {textContent: 'Total'}));
  grandRow.appendChild(el('span', {textContent: fmt(total, currency)}));
  totals.appendChild(grandRow);
  inv.appendChild(totals);

  // Pay Button
  if (stripeLink) {
    var payBtn = el('a', {className: 'inv-pay-btn', href: stripeLink, target: '_blank', rel: 'noopener noreferrer', textContent: 'Pay Now - ' + fmt(total, currency)});
    inv.appendChild(payBtn);
  }

  inv.appendChild(el('div', {className: 'inv-footer', textContent: 'Generated with InvoiceForge'}));
  output.appendChild(inv);

  // Store current invoice data for saving
  window._currentInvoice = {
    bizName: bizName, bizEmail: bizEmail, bizAddress: bizAddress,
    clientName: clientName, clientEmail: clientEmail,
    invNumber: invNumber, dueDate: dueDate,
    taxRate: taxRate, currency: currency, stripeLink: stripeLink,
    items: items, subtotal: subtotal, taxAmt: taxAmt, total: total,
    status: 'draft', createdAt: new Date().toISOString()
  };

  switchView('viewPreview');
}

// ===== STORAGE =====
function getInvoices() {
  try { return JSON.parse(localStorage.getItem('invoiceforge_invoices') || '[]'); }
  catch(e) { return []; }
}

function saveInvoice() {
  if (!window._currentInvoice) { showToast('No invoice to save'); return; }
  var invoices = getInvoices();
  var inv = window._currentInvoice;
  inv.id = Date.now();
  invoices.unshift(inv);
  localStorage.setItem('invoiceforge_invoices', JSON.stringify(invoices));
  showToast('Invoice saved');
  switchView('viewTracker');
  renderTracker();
}

function updateInvoiceStatus(id, newStatus) {
  var invoices = getInvoices();
  for (var i = 0; i < invoices.length; i++) {
    if (invoices[i].id === id) {
      invoices[i].status = newStatus;
      if (newStatus === 'paid') invoices[i].paidAt = new Date().toISOString();
      break;
    }
  }
  localStorage.setItem('invoiceforge_invoices', JSON.stringify(invoices));
  renderTracker();
  showToast('Status updated to ' + newStatus);
}

function deleteInvoice(id) {
  var invoices = getInvoices().filter(function(inv){ return inv.id !== id; });
  localStorage.setItem('invoiceforge_invoices', JSON.stringify(invoices));
  renderTracker();
  showToast('Invoice deleted');
}

// ===== TRACKER =====
function renderTracker() {
  var invoices = getInvoices();
  var list = document.getElementById('trackerList');
  var statsEl = document.getElementById('trackerStats');
  list.textContent = '';
  statsEl.textContent = '';

  // Check for overdue
  var now = new Date();
  for (var o = 0; o < invoices.length; o++) {
    if (invoices[o].status !== 'paid' && invoices[o].dueDate) {
      var due = new Date(invoices[o].dueDate + 'T23:59:59');
      if (due < now && invoices[o].status !== 'overdue') {
        invoices[o].status = 'overdue';
      }
    }
  }
  localStorage.setItem('invoiceforge_invoices', JSON.stringify(invoices));

  // Stats
  var totalOutstanding = 0, totalPaid = 0, totalOverdue = 0, count = invoices.length;
  for (var s = 0; s < invoices.length; s++) {
    if (invoices[s].status === 'paid') totalPaid += invoices[s].total;
    else if (invoices[s].status === 'overdue') { totalOverdue += invoices[s].total; totalOutstanding += invoices[s].total; }
    else totalOutstanding += invoices[s].total;
  }

  var statsRow = el('div', {className: 'stats-row'});
  var s1 = el('div', {className: 'stat-card'});
  s1.appendChild(el('div', {className: 'stat-value', textContent: fmt(totalOutstanding, 'USD'), style: 'color:var(--orange)'}));
  s1.appendChild(el('div', {className: 'stat-label', textContent: 'Outstanding'}));
  statsRow.appendChild(s1);
  var s2 = el('div', {className: 'stat-card'});
  s2.appendChild(el('div', {className: 'stat-value', textContent: fmt(totalPaid, 'USD'), style: 'color:var(--accent2)'}));
  s2.appendChild(el('div', {className: 'stat-label', textContent: 'Collected'}));
  statsRow.appendChild(s2);
  if (totalOverdue > 0) {
    var s3 = el('div', {className: 'stat-card'});
    s3.appendChild(el('div', {className: 'stat-value', textContent: fmt(totalOverdue, 'USD'), style: 'color:var(--red)'}));
    s3.appendChild(el('div', {className: 'stat-label', textContent: 'Overdue'}));
    statsRow.appendChild(s3);
  }
  statsEl.appendChild(statsRow);

  if (invoices.length === 0) {
    list.appendChild(el('div', {className: 'empty-state'}, [el('p', {textContent: 'No invoices yet. Create your first one above.'})]));
    return;
  }

  for (var i = 0; i < invoices.length; i++) {
    (function(inv){
      var card = el('div', {className: 'tracker-card'});
      var header = el('div', {className: 'tracker-card-header'});
      header.appendChild(el('span', {className: 'tracker-card-title', textContent: (inv.invNumber ? '#' + inv.invNumber + ' - ' : '') + inv.clientName}));
      header.appendChild(el('span', {className: 'tracker-card-amount', textContent: fmt(inv.total, inv.currency)}));
      card.appendChild(header);

      var meta = el('div', {className: 'tracker-card-meta'});
      meta.appendChild(el('span', {className: 'tracker-card-status status-' + inv.status, textContent: inv.status}));
      if (inv.dueDate) {
        var dd = new Date(inv.dueDate + 'T00:00:00');
        meta.appendChild(el('span', {textContent: 'Due: ' + dd.toLocaleDateString()}));
      }
      meta.appendChild(el('span', {textContent: new Date(inv.createdAt).toLocaleDateString()}));
      card.appendChild(meta);

      var actions = el('div', {className: 'tracker-card-actions'});
      if (inv.status !== 'paid') {
        actions.appendChild(el('button', {className: 'btn btn-sm btn-primary', textContent: 'Mark Paid', onClick: function(e){ e.stopPropagation(); updateInvoiceStatus(inv.id, 'paid'); }}));
        if (inv.status === 'draft') {
          actions.appendChild(el('button', {className: 'btn btn-sm btn-secondary', textContent: 'Mark Sent', onClick: function(e){ e.stopPropagation(); updateInvoiceStatus(inv.id, 'sent'); }}));
        }
      }
      actions.appendChild(el('button', {className: 'btn btn-sm btn-danger', textContent: 'Delete', onClick: function(e){ e.stopPropagation(); deleteInvoice(inv.id); }}));
      card.appendChild(actions);
      list.appendChild(card);
    })(invoices[i]);
  }
}

// ===== TEMPLATES =====
function getTemplates() {
  try { return JSON.parse(localStorage.getItem('invoiceforge_templates') || '[]'); }
  catch(e) { return []; }
}

function saveAsTemplate() {
  var bizName = document.getElementById('inputBizName').value.trim();
  var items = getLineItems();
  if (!bizName || items.length === 0) {
    showToast('Fill in business name and add items first');
    return;
  }

  var templates = getTemplates();
  templates.push({
    id: Date.now(),
    name: bizName + ' - ' + items[0].description,
    bizName: bizName,
    bizEmail: document.getElementById('inputBizEmail').value.trim(),
    bizAddress: document.getElementById('inputBizAddress').value.trim(),
    taxRate: parseFloat(document.getElementById('inputTaxRate').value) || 0,
    currency: document.getElementById('inputCurrency').value,
    stripeLink: document.getElementById('inputStripeLink').value.trim(),
    items: items
  });
  localStorage.setItem('invoiceforge_templates', JSON.stringify(templates));
  showToast('Template saved');
  renderTemplates();
}

function loadTemplate(tmpl) {
  document.getElementById('inputBizName').value = tmpl.bizName || '';
  document.getElementById('inputBizEmail').value = tmpl.bizEmail || '';
  document.getElementById('inputBizAddress').value = tmpl.bizAddress || '';
  document.getElementById('inputTaxRate').value = tmpl.taxRate || 0;
  document.getElementById('inputCurrency').value = tmpl.currency || 'USD';
  document.getElementById('inputStripeLink').value = tmpl.stripeLink || '';
  document.getElementById('inputClientName').value = '';
  document.getElementById('inputClientEmail').value = '';

  // Clear and rebuild line items
  document.getElementById('lineItemsContainer').textContent = '';
  lineItemCount = 0;
  if (tmpl.items) {
    for (var i = 0; i < tmpl.items.length; i++) {
      addLineItem(tmpl.items[i].description, tmpl.items[i].quantity, tmpl.items[i].rate);
    }
  }

  // Set new invoice number
  var invoices = getInvoices();
  document.getElementById('inputInvNumber').value = 'INV-' + String(invoices.length + 1).padStart(4, '0');

  switchView('viewCreate');
  showToast('Template loaded');
}

function renderTemplates() {
  var list = document.getElementById('templateList');
  list.textContent = '';
  var templates = getTemplates();

  // Built-in templates
  var builtIn = [
    {id: 'bi-1', name: 'Hourly Consulting', description: 'Consulting hours with hourly rate', bizName: 'Your Name', items: [{description: 'Consulting Hours', quantity: 10, rate: 150, total: 1500}], taxRate: 0, currency: 'USD'},
    {id: 'bi-2', name: 'Fixed Project', description: 'Fixed-price project with milestones', bizName: 'Your Name', items: [{description: 'Project Deposit (50%)', quantity: 1, rate: 2500, total: 2500}, {description: 'Final Delivery (50%)', quantity: 1, rate: 2500, total: 2500}], taxRate: 0, currency: 'USD'},
    {id: 'bi-3', name: 'Monthly Retainer', description: 'Recurring monthly service', bizName: 'Your Name', items: [{description: 'Monthly Retainer - March 2026', quantity: 1, rate: 3000, total: 3000}], taxRate: 0, currency: 'USD'}
  ];

  list.appendChild(el('div', {className: 'section-title', textContent: 'Built-In Templates', style: 'margin-top:0'}));
  for (var b = 0; b < builtIn.length; b++) {
    (function(tmpl){
      var card = el('div', {className: 'template-card'});
      card.appendChild(el('div', {className: 'template-card-name', textContent: tmpl.name}));
      card.appendChild(el('div', {className: 'template-card-desc', textContent: tmpl.description}));
      card.addEventListener('click', function(){ loadTemplate(tmpl); });
      list.appendChild(card);
    })(builtIn[b]);
  }

  if (templates.length > 0) {
    list.appendChild(el('div', {className: 'section-title', textContent: 'Your Templates', style: 'margin-top:16px'}));
    for (var t = 0; t < templates.length; t++) {
      (function(tmpl){
        var card = el('div', {className: 'template-card'});
        var header = el('div', {style: 'display:flex;justify-content:space-between;align-items:center'});
        header.appendChild(el('div', {className: 'template-card-name', textContent: tmpl.name}));
        var delBtn = el('button', {className: 'btn btn-sm btn-danger', textContent: 'x', onClick: function(e){
          e.stopPropagation();
          var ts = getTemplates().filter(function(x){ return x.id !== tmpl.id; });
          localStorage.setItem('invoiceforge_templates', JSON.stringify(ts));
          renderTemplates();
          showToast('Template deleted');
        }});
        header.appendChild(delBtn);
        card.appendChild(header);
        card.appendChild(el('div', {className: 'template-card-desc', textContent: tmpl.items.length + ' item(s)'}));
        card.addEventListener('click', function(){ loadTemplate(tmpl); });
        list.appendChild(card);
      })(templates[t]);
    }
  }
}

// ===== NAV =====
function switchView(viewId) {
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
  document.getElementById(viewId).classList.add('active');
  var navs = document.querySelectorAll('.nav-item');
  for (var j = 0; j < navs.length; j++) {
    navs[j].classList.toggle('active', navs[j].getAttribute('data-view') === viewId);
  }
  if (viewId === 'viewTracker') renderTracker();
  if (viewId === 'viewTemplates') renderTemplates();
  document.getElementById('mainScroll').scrollTop = 0;
}

// ===== PRIVACY =====
function showPrivacy() {
  var overlay = document.getElementById('privacyOverlay');
  var content = document.getElementById('privacyContent');
  content.textContent = '';
  content.appendChild(el('h2', {textContent: 'Privacy Policy'}));
  content.appendChild(el('p', {textContent: 'InvoiceForge is a client-side web application. All invoice data, templates, and payment records stay on your device in localStorage. No data is sent to any server.'}));
  content.appendChild(el('p', {textContent: 'We do not collect personal information, business data, client information, or financial details. No analytics, no tracking cookies, no third-party data sharing.'}));
  content.appendChild(el('p', {textContent: 'The "Pay Now" button links to your own Stripe payment link. We have no access to payment transactions.'}));
  content.appendChild(el('p', {textContent: 'PDF export uses your browser\'s built-in print functionality. No data leaves your device.'}));
  content.appendChild(el('p', {textContent: 'You can clear all stored data at any time via browser settings. Last updated: March 2026.'}));
  var closeBtn = el('button', {className: 'btn btn-secondary', textContent: 'Close', style: 'margin-top:16px', onClick: function(){ overlay.classList.remove('show'); }});
  content.appendChild(closeBtn);
  overlay.classList.add('show');
}

function addFooters() {
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) {
    var footer = el('div', {style: 'text-align:center;padding:24px 20px 16px'});
    var link = el('a', {style: 'font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline', textContent: 'Privacy Policy'});
    link.addEventListener('click', showPrivacy);
    footer.appendChild(link);
    views[i].appendChild(footer);
  }
}

function resetForm() {
  document.getElementById('inputBizName').value = '';
  document.getElementById('inputBizEmail').value = '';
  document.getElementById('inputBizAddress').value = '';
  document.getElementById('inputClientName').value = '';
  document.getElementById('inputClientEmail').value = '';
  document.getElementById('inputDueDate').value = '';
  document.getElementById('inputTaxRate').value = '0';
  document.getElementById('inputCurrency').value = 'USD';
  document.getElementById('inputStripeLink').value = '';
  document.getElementById('lineItemsContainer').textContent = '';
  lineItemCount = 0;
  addLineItem();
  var invoices = getInvoices();
  document.getElementById('inputInvNumber').value = 'INV-' + String(invoices.length + 1).padStart(4, '0');
  document.getElementById('runningTotal').textContent = '';
  switchView('viewCreate');
}

// ===== INIT =====
// Set default invoice number
var existingInvoices = getInvoices();
document.getElementById('inputInvNumber').value = 'INV-' + String(existingInvoices.length + 1).padStart(4, '0');

// Set default due date (30 days from now)
var defaultDue = new Date();
defaultDue.setDate(defaultDue.getDate() + 30);
document.getElementById('inputDueDate').value = defaultDue.toISOString().split('T')[0];

// Add first line item
addLineItem();

// Load saved biz info
try {
  var savedBiz = JSON.parse(localStorage.getItem('invoiceforge_biz'));
  if (savedBiz) {
    document.getElementById('inputBizName').value = savedBiz.name || '';
    document.getElementById('inputBizEmail').value = savedBiz.email || '';
    document.getElementById('inputBizAddress').value = savedBiz.address || '';
  }
} catch(e) {}

// Save biz info on change
['inputBizName', 'inputBizEmail', 'inputBizAddress'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() {
    localStorage.setItem('invoiceforge_biz', JSON.stringify({
      name: document.getElementById('inputBizName').value.trim(),
      email: document.getElementById('inputBizEmail').value.trim(),
      address: document.getElementById('inputBizAddress').value.trim()
    }));
  });
});

// Update running total when tax/currency changes
document.getElementById('inputTaxRate').addEventListener('input', updateRunningTotal);
document.getElementById('inputCurrency').addEventListener('change', updateRunningTotal);

// Event listeners
document.getElementById('btnAddLine').addEventListener('click', function(){ addLineItem(); });
document.getElementById('btnPreview').addEventListener('click', buildPreview);
document.getElementById('btnSaveInvoice').addEventListener('click', saveInvoice);
document.getElementById('btnPrintInvoice').addEventListener('click', function(){ window.print(); });
document.getElementById('btnEditInvoice').addEventListener('click', function(){ switchView('viewCreate'); });
document.getElementById('btnNewInvoice').addEventListener('click', resetForm);
document.getElementById('btnSaveTemplate').addEventListener('click', saveAsTemplate);

var navItems = document.querySelectorAll('.nav-item');
for (var n = 0; n < navItems.length; n++) {
  navItems[n].addEventListener('click', function(){
    switchView(this.getAttribute('data-view'));
  });
}

addFooters();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(e){ console.log('SW registration failed:', e); });
}

})();
</script>
