<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background with rounded corners (iOS style) -->
  <rect width="1024" height="1024" rx="200" fill="#0c0c18"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1c1c30" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#grid)"/>

  <!-- Invoice document shadow -->
  <rect x="282" y="210" width="490" height="620" rx="28" fill="#000" opacity="0.35"/>

  <!-- Invoice document body -->
  <rect x="270" y="195" width="490" height="620" rx="24" fill="#1c1c30" stroke="#262642" stroke-width="2"/>

  <!-- Invoice header bar -->
  <rect x="270" y="195" width="490" height="90" rx="24" fill="#10b981" opacity="0.12"/>
  <rect x="270" y="255" width="490" height="30" fill="#1c1c30"/>

  <!-- "INVOICE" label -->
  <text x="310" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="800" fill="#10b981" letter-spacing="3">INVOICE</text>

  <!-- Invoice number -->
  <text x="656" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#5e5e7a" text-anchor="end">#0042</text>

  <!-- Divider -->
  <line x1="310" y1="305" x2="720" y2="305" stroke="#262642" stroke-width="2"/>

  <!-- Line items -->
  <!-- Item 1 -->
  <rect x="310" y="325" width="250" height="12" rx="6" fill="#34d399" opacity="0.7"/>
  <rect x="620" y="325" width="80" height="12" rx="6" fill="#5e5e7a" opacity="0.6"/>

  <!-- Item 2 -->
  <rect x="310" y="360" width="180" height="10" rx="5" fill="#5e5e7a" opacity="0.5"/>
  <rect x="620" y="360" width="80" height="10" rx="5" fill="#5e5e7a" opacity="0.5"/>

  <!-- Item 3 -->
  <rect x="310" y="395" width="210" height="10" rx="5" fill="#5e5e7a" opacity="0.4"/>
  <rect x="620" y="395" width="80" height="10" rx="5" fill="#5e5e7a" opacity="0.4"/>

  <!-- Item 4 -->
  <rect x="310" y="430" width="165" height="10" rx="5" fill="#5e5e7a" opacity="0.3"/>
  <rect x="620" y="430" width="80" height="10" rx="5" fill="#5e5e7a" opacity="0.3"/>

  <!-- Subtotal divider -->
  <line x1="310" y1="468" x2="720" y2="468" stroke="#262642" stroke-width="1.5"/>

  <!-- Subtotal row -->
  <text x="560" y="498" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#9898b8">Subtotal</text>
  <text x="710" y="498" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#9898b8" text-anchor="end">$2,400</text>

  <!-- Tax row -->
  <text x="560" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#5e5e7a">Tax (10%)</text>
  <text x="710" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#5e5e7a" text-anchor="end">$240</text>

  <!-- Total divider -->
  <line x1="500" y1="558" x2="720" y2="558" stroke="#10b981" stroke-width="2" opacity="0.5"/>

  <!-- TOTAL label -->
  <text x="560" y="592" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#eeeef4">TOTAL</text>
  <text x="710" y="592" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="800" fill="#10b981" text-anchor="end">$2,640</text>

  <!-- Green "Pay Now" button at bottom -->
  <rect x="310" y="700" width="400" height="70" rx="16" fill="#10b981"/>
  <text x="510" y="743" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Pay Now</text>
</svg>
