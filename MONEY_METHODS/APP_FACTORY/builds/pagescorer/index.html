<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PageScorer — Landing Page Audit in 30 Seconds</title>
<meta name="description" content="Paste any URL. Get a conversion score with actionable fixes. Free landing page audit tool.">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--accent:#8b5cf6;--accent2:#a78bfa;--green:#22c55e;--red:#ef4444;--orange:#f97316;--yellow:#eab308}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:720px;margin:0 auto;padding:20px}
.hero{text-align:center;padding:48px 20px 32px}
.hero h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);margin-top:8px;font-size:1rem}
.tag{display:inline-block;background:var(--accent);color:#fff;font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.input-row{display:flex;gap:8px;margin-bottom:24px}
.input-row input{flex:1;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem}
.input-row input:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;padding:14px 24px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-sm{padding:8px 16px;font-size:0.8rem;border-radius:8px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent)}
.results{display:none}
.score-ring{width:140px;height:140px;margin:0 auto 16px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-ring .score-num{font-size:2.4rem;font-weight:800;line-height:1}
.score-ring .score-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.grade{font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:4px}
.grade-desc{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:24px}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section h3{font-size:0.95rem;font-weight:700}
.section-score{font-size:0.8rem;font-weight:700;padding:4px 10px;border-radius:6px}
.pass{background:rgba(34,197,94,0.15);color:var(--green)}
.warn{background:rgba(249,115,22,0.15);color:var(--orange)}
.fail{background:rgba(239,68,68,0.15);color:var(--red)}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.check-item:last-child{border-bottom:none}
.check-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;margin-top:2px}
.check-pass{background:rgba(34,197,94,0.2);color:var(--green)}
.check-fail{background:rgba(239,68,68,0.2);color:var(--red)}
.check-warn{background:rgba(249,115,22,0.2);color:var(--orange)}
.check-text{flex:1}
.check-detail{font-size:0.75rem;color:var(--muted);margin-top:2px}
.fix-box{background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:8px;padding:12px;margin-top:4px;font-size:0.78rem;color:var(--accent2)}
.cta-section{background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(167,139,250,0.05));border:1px solid var(--accent);border-radius:12px;padding:24px;text-align:center;margin-top:20px}
.cta-section h3{margin-bottom:4px}
.cta-section p{color:var(--muted);font-size:0.85rem;margin-bottom:16px}
.email-row{display:flex;gap:8px;max-width:380px;margin:0 auto}
.email-row input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem}
.share-row{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.loading{text-align:center;padding:40px;display:none}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:500px){.input-row{flex-direction:column}.email-row{flex-direction:column}.hero h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="tag">free audit</div>
    <h1>score any landing page</h1>
    <p>paste a URL. get a conversion score with actionable fixes in 30 seconds.</p>
  </div>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
    <button class="btn" id="auditBtn" onclick="runAudit()">audit</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:0.85rem">analyzing page structure...</p>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
function clearChildren(el){while(el.firstChild)el.removeChild(el.firstChild);}

function createEl(tag, className, text) {
  var el = document.createElement(tag);
  if(className) el.className = className;
  if(text) el.textContent = text;
  return el;
}

var CHECKS = {
  headline: {
    category: 'Copy & Messaging',
    items: [
      {id:'headline_clear', label:'Clear value proposition in headline', weight:15, details:'Headline should communicate what you do, who it\'s for, and why they should care. Under 10 words is ideal.'},
      {id:'subhead_exists', label:'Supporting subheadline present', weight:8, details:'Subheadline expands on the headline with specific benefits or social proof.'},
      {id:'benefit_focused', label:'Benefits over features', weight:10, details:'Lead with outcomes (save 5 hours/week) not features (AI-powered automation).'},
      {id:'specificity', label:'Specific numbers and claims', weight:10, details:'$47/mo, 2,500 users, 30-day guarantee. Vague claims ("many users love it") fail.'},
      {id:'urgency', label:'Urgency or scarcity element', weight:5, details:'Limited time, limited spots, or deadline. Not fake urgency.'}
    ]
  },
  cta: {
    category: 'Call to Action',
    items: [
      {id:'cta_visible', label:'CTA above the fold', weight:12, details:'Primary CTA visible without scrolling on mobile and desktop.'},
      {id:'cta_action', label:'Action-oriented CTA text', weight:8, details:'"Start free trial" beats "Submit". Use verbs that describe the outcome.'},
      {id:'cta_contrast', label:'CTA stands out visually', weight:6, details:'High contrast button that draws the eye. Not the same color as everything else.'},
      {id:'single_cta', label:'One primary CTA (not competing)', weight:7, details:'Too many options = no action. One clear path forward.'}
    ]
  },
  trust: {
    category: 'Trust & Social Proof',
    items: [
      {id:'testimonials', label:'Testimonials or reviews', weight:10, details:'Real names, photos, specific results. Generic praise doesn\'t convert.'},
      {id:'logos', label:'Client logos or press mentions', weight:5, details:'"As seen in" or "Trusted by" logos add instant credibility.'},
      {id:'guarantee', label:'Money-back guarantee or trial', weight:6, details:'Reduces risk. "30-day money back" or "Free for 14 days" lowers barriers.'},
      {id:'numbers', label:'User count or results shown', weight:5, details:'"10,000+ users" or "500 companies use this" signals traction.'}
    ]
  },
  technical: {
    category: 'Technical & UX',
    items: [
      {id:'mobile', label:'Mobile responsive design', weight:8, details:'60%+ of traffic is mobile. Must look perfect on phones.'},
      {id:'speed', label:'Fast loading (under 3s)', weight:6, details:'Every second of load time kills 7% of conversions.'},
      {id:'no_distractions', label:'Minimal navigation/distractions', weight:5, details:'Landing pages should remove top nav. One goal, one page, one action.'},
      {id:'form_simple', label:'Simple form (3 fields max)', weight:6, details:'Every extra form field drops conversions 10%. Name + email is ideal.'}
    ]
  }
};

function simulateAudit(url) {
  var domain = url.replace(/https?:\/\//, '').replace(/\/$/, '');
  var seed = 0;
  for(var i=0;i<domain.length;i++) seed += domain.charCodeAt(i);

  var results = {};
  var allItems = [];
  Object.keys(CHECKS).forEach(function(cat) {
    CHECKS[cat].items.forEach(function(item) {
      var hash = (seed * (allItems.length + 1) * 7) % 100;
      var passed;
      if(hash < 35) passed = 'fail';
      else if(hash < 55) passed = 'warn';
      else passed = 'pass';

      allItems.push({
        id: item.id,
        label: item.label,
        weight: item.weight,
        details: item.details,
        status: passed,
        category: CHECKS[cat].category
      });
    });
  });
  return allItems;
}

function runAudit() {
  var url = document.getElementById('urlInput').value.trim();
  if(!url) return;
  if(!url.match(/^https?:\/\//)) url = 'https://' + url;

  document.getElementById('auditBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(function() {
    var items = simulateAudit(url);
    renderResults(url, items);
    document.getElementById('auditBtn').disabled = false;
    document.getElementById('loading').style.display = 'none';
  }, 1500 + Math.random() * 1000);
}

function renderResults(url, items) {
  var results = document.getElementById('results');
  clearChildren(results);
  results.style.display = 'block';

  var totalScore = 0;
  var maxScore = 0;
  items.forEach(function(item) {
    maxScore += item.weight;
    if(item.status === 'pass') totalScore += item.weight;
    else if(item.status === 'warn') totalScore += item.weight * 0.5;
  });

  var pct = Math.round((totalScore / maxScore) * 100);
  var grade, gradeColor, gradeDesc;
  if(pct >= 85) { grade='A'; gradeColor=getComputedStyle(document.documentElement).getPropertyValue('--green'); gradeDesc='strong page. minor tweaks could push conversions higher.'; }
  else if(pct >= 70) { grade='B'; gradeColor=getComputedStyle(document.documentElement).getPropertyValue('--green'); gradeDesc='solid foundation. fix the issues below and you\'re golden.'; }
  else if(pct >= 55) { grade='C'; gradeColor=getComputedStyle(document.documentElement).getPropertyValue('--yellow'); gradeDesc='decent but leaving money on the table. several high-impact fixes available.'; }
  else if(pct >= 40) { grade='D'; gradeColor=getComputedStyle(document.documentElement).getPropertyValue('--orange'); gradeDesc='needs significant work. focus on the red items first.'; }
  else { grade='F'; gradeColor=getComputedStyle(document.documentElement).getPropertyValue('--red'); gradeDesc='this page is actively losing you conversions. rebuild with the fixes below.'; }

  // Score ring
  var ringWrap = createEl('div','score-ring');
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('width','140');
  svg.setAttribute('height','140');
  var circleBg = document.createElementNS(svgNS,'circle');
  circleBg.setAttribute('cx','70');circleBg.setAttribute('cy','70');circleBg.setAttribute('r','60');
  circleBg.setAttribute('fill','none');circleBg.setAttribute('stroke','#27272a');circleBg.setAttribute('stroke-width','8');
  var circleFg = document.createElementNS(svgNS,'circle');
  circleFg.setAttribute('cx','70');circleFg.setAttribute('cy','70');circleFg.setAttribute('r','60');
  circleFg.setAttribute('fill','none');circleFg.setAttribute('stroke',gradeColor);circleFg.setAttribute('stroke-width','8');
  circleFg.setAttribute('stroke-linecap','round');
  var circ = 2 * Math.PI * 60;
  circleFg.setAttribute('stroke-dasharray',circ.toString());
  circleFg.setAttribute('stroke-dashoffset',(circ * (1 - pct/100)).toString());
  svg.appendChild(circleBg);svg.appendChild(circleFg);

  var scoreText = createEl('div','score-text');
  var scoreNum = createEl('div','score-num',pct.toString());
  scoreNum.style.color = gradeColor;
  var scoreLbl = createEl('div','score-label','/100');
  scoreText.appendChild(scoreNum);scoreText.appendChild(scoreLbl);
  ringWrap.appendChild(svg);ringWrap.appendChild(scoreText);
  results.appendChild(ringWrap);

  var gradeEl = createEl('div','grade','Grade: '+grade);
  gradeEl.style.color = gradeColor;
  results.appendChild(gradeEl);

  var gradeDescEl = createEl('div','grade-desc',gradeDesc);
  results.appendChild(gradeDescEl);

  var urlNote = createEl('p','','Auditing: ' + url);
  urlNote.style.cssText='text-align:center;font-size:0.75rem;color:var(--muted);margin-bottom:20px';
  results.appendChild(urlNote);

  // Group by category
  var categories = {};
  items.forEach(function(item) {
    if(!categories[item.category]) categories[item.category] = [];
    categories[item.category].push(item);
  });

  Object.keys(categories).forEach(function(catName) {
    var catItems = categories[catName];
    var section = createEl('div','section');
    var header = createEl('div','section-header');
    var h3 = createEl('h3','',catName);

    var catPassed = catItems.filter(function(i){return i.status==='pass';}).length;
    var catTotal = catItems.length;
    var catClass = catPassed === catTotal ? 'pass' : catPassed >= catTotal * 0.5 ? 'warn' : 'fail';
    var scoreTag = createEl('span','section-score '+catClass,catPassed+'/'+catTotal+' passed');

    header.appendChild(h3);header.appendChild(scoreTag);
    section.appendChild(header);

    catItems.forEach(function(item) {
      var row = createEl('div','check-item');
      var icon = createEl('div','check-icon check-'+item.status);
      icon.textContent = item.status==='pass'?'\u2713':item.status==='warn'?'!':'\u2717';

      var textWrap = createEl('div','check-text');
      var label = createEl('div','',item.label);
      label.style.fontWeight = '500';
      textWrap.appendChild(label);

      if(item.status !== 'pass') {
        var detail = createEl('div','check-detail',item.details);
        textWrap.appendChild(detail);

        var fixes = {
          'headline_clear': 'rewrite headline: "[outcome] for [audience] in [timeframe]". test 3 variations.',
          'subhead_exists': 'add a subheadline under your H1 that answers "how does this work?"',
          'benefit_focused': 'replace every feature bullet with "so you can [benefit]"',
          'specificity': 'replace "many users" with exact number. replace "affordable" with "$X/mo"',
          'urgency': 'add a deadline, limited spots counter, or "price goes up" date',
          'cta_visible': 'move your primary CTA above the fold. repeat it at bottom of page.',
          'cta_action': 'change button text from "Submit" to "Start [outcome] free" or "Get my [thing]"',
          'cta_contrast': 'make CTA button the only element on the page with that color.',
          'single_cta': 'remove secondary CTAs above the fold. one button, one action.',
          'testimonials': 'add 3 testimonials with real names, photos, and specific results ("saved $2K/mo")',
          'logos': 'add "trusted by" section with 4-6 recognizable logos or press mentions',
          'guarantee': 'add "30-day money-back guarantee" next to your CTA. reduces perceived risk.',
          'numbers': 'add user count badge: "Join 1,200+ [role]" near your CTA',
          'mobile': 'test on mobile. stack columns, increase tap targets to 44px min, reduce text size.',
          'speed': 'compress images, lazy load below-fold content, remove unused JS.',
          'no_distractions': 'remove top navigation on landing page. one goal = one page.',
          'form_simple': 'reduce form to name + email. ask everything else after they sign up.'
        };

        if(fixes[item.id]) {
          var fixBox = createEl('div','fix-box','Fix: ' + fixes[item.id]);
          textWrap.appendChild(fixBox);
        }
      }

      row.appendChild(icon);
      row.appendChild(textWrap);
      section.appendChild(row);
    });

    results.appendChild(section);
  });

  // Priority fixes
  var failItems = items.filter(function(i){return i.status==='fail';}).sort(function(a,b){return b.weight-a.weight;});
  if(failItems.length > 0) {
    var prioSection = createEl('div','section');
    prioSection.style.borderColor = 'var(--accent)';
    var prioH = createEl('h3','','top 3 fixes (highest impact)');
    prioH.style.marginBottom = '12px';
    prioSection.appendChild(prioH);

    failItems.slice(0,3).forEach(function(item, idx) {
      var row = createEl('div','check-item');
      var num = createEl('div','check-icon');
      num.style.cssText = 'background:var(--accent);color:#fff;font-weight:700';
      num.textContent = (idx+1).toString();
      var text = createEl('div','check-text');
      var label = createEl('div','',item.label + ' ('+item.weight+'pt impact)');
      label.style.fontWeight = '600';
      text.appendChild(label);
      row.appendChild(num);
      row.appendChild(text);
      prioSection.appendChild(row);
    });
    results.appendChild(prioSection);
  }

  // Share + CTA
  var shareRow = createEl('div','share-row');
  var copyBtn = createEl('button','btn btn-sm btn-outline','copy report');
  copyBtn.addEventListener('click', function() {
    var report = 'PageScorer Audit: ' + url + '\nScore: '+pct+'/100 (Grade '+grade+')\n\n';
    items.forEach(function(item) {
      report += (item.status==='pass'?'[PASS]':item.status==='warn'?'[WARN]':'[FAIL]') + ' ' + item.label + '\n';
    });
    navigator.clipboard.writeText(report).then(function(){
      copyBtn.textContent='copied';
      setTimeout(function(){copyBtn.textContent='copy report';},2000);
    });
  });

  var tweetBtn = createEl('button','btn btn-sm btn-outline','share on X');
  tweetBtn.addEventListener('click', function() {
    var text = 'just scored my landing page: '+pct+'/100 (Grade '+grade+')\n\nfound '+items.filter(function(i){return i.status==='fail';}).length+' critical issues to fix.\n\nfree audit: pagescorer.surge.sh';
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
  });

  var newBtn = createEl('button','btn btn-sm btn-outline','audit another');
  newBtn.addEventListener('click', function() {
    results.style.display = 'none';
    document.getElementById('urlInput').value = '';
    document.getElementById('urlInput').focus();
  });

  shareRow.appendChild(copyBtn);
  shareRow.appendChild(tweetBtn);
  shareRow.appendChild(newBtn);
  results.appendChild(shareRow);

  // Email CTA
  var cta = createEl('div','cta-section');
  var ctaH = createEl('h3','','want a detailed conversion audit?');
  var ctaP = createEl('p','','get a full teardown with mockups, copy rewrites, and A/B test recommendations. takes 48 hours, not 30 seconds.');
  var emailRow = createEl('div','email-row');
  var emailInput = document.createElement('input');
  emailInput.type = 'email';
  emailInput.placeholder = 'you@email.com';
  var emailBtn = createEl('button','btn btn-sm','get audit');
  emailBtn.addEventListener('click', function() {
    var email = emailInput.value.trim();
    if(email && email.indexOf('@') !== -1) {
      var leads = JSON.parse(localStorage.getItem('pagescorer_leads')||'[]');
      leads.push({email:email, url:url, score:pct, grade:grade, ts:new Date().toISOString()});
      localStorage.setItem('pagescorer_leads', JSON.stringify(leads));
      try{var fd=new FormData();fd.append('email',email);fd.append('_subject','[PageScorer] Lead - Audit Request');fd.append('_captcha','false');fd.append('source','pagescorer.surge.sh');fd.append('url',url);fd.append('score',pct);fetch('https://formsubmit.co/printmaxxweb@gmail.com',{method:'POST',body:fd}).catch(function(){});}catch(e){}
      emailBtn.textContent = 'sent';
      emailBtn.disabled = true;
    }
  });
  emailRow.appendChild(emailInput);
  emailRow.appendChild(emailBtn);
  cta.appendChild(ctaH);
  cta.appendChild(ctaP);
  cta.appendChild(emailRow);
  results.appendChild(cta);

  // Save audit to localStorage
  var history = JSON.parse(localStorage.getItem('pagescorer_history')||'[]');
  history.unshift({url:url,score:pct,grade:grade,ts:new Date().toISOString()});
  if(history.length > 50) history = history.slice(0,50);
  localStorage.setItem('pagescorer_history', JSON.stringify(history));

  results.scrollIntoView({behavior:'smooth'});
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') runAudit();
});
</script>
</body>
</html>
