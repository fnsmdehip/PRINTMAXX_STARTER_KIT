<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save Image As" to public/ folder</p>
<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const p = s / 40;

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();

  // Shield
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = p * 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s/2, s*0.12);
  ctx.lineTo(s*0.22, s*0.27);
  ctx.lineTo(s*0.22, s*0.52);
  ctx.quadraticCurveTo(s*0.22, s*0.82, s/2, s*0.9);
  ctx.quadraticCurveTo(s*0.78, s*0.82, s*0.78, s*0.52);
  ctx.lineTo(s*0.78, s*0.27);
  ctx.closePath();
  ctx.stroke();

  // Fill shield slightly
  ctx.fillStyle = 'rgba(233, 69, 96, 0.1)';
  ctx.fill();

  // Checkmark
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = p * 3;
  ctx.beginPath();
  ctx.moveTo(s*0.35, s*0.52);
  ctx.lineTo(s*0.45, s*0.62);
  ctx.lineTo(s*0.65, s*0.42);
  ctx.stroke();
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
