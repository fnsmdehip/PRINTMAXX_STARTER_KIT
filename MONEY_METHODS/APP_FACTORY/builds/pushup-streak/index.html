<style>
  body { background: #0f0a0a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .glass { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); backdrop-filter: blur(10px); }
  .glass-light { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .tab-active { background: rgba(220,38,38,0.3); border-color: rgba(220,38,38,0.6) !important; color: #fca5a5; }
  .badge-earned { background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.5); }
  .badge-locked { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); opacity: 0.5; }
  .heat-on { background: #dc2626; }
  .heat-off { background: rgba(255,255,255,0.06); }
  .heat-today { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.6); }
  .slide-up { animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .btn-primary { background: #dc2626; transition: background 0.2s; }
  .btn-primary:hover { background: #b91c1c; }
  .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
  .modal-card { background: #1a0f0f; border: 1px solid rgba(220,38,38,0.3); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 24px; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #dc2626; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 100; animation: fadeInOut 2s ease forwards; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }

<body class="min-h-screen pb-20">
<div id="app">
  <div class="glass sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">💪</span>
      <span class="font-bold text-red-300 text-lg">PushupStreak</span>
    </div>
    <div id="header-streak" class="text-sm text-red-300 font-medium"></div>
  </div>
  <div class="flex gap-2 px-4 pt-4 pb-2">
    <button id="tab-today" onclick="switchTab('today')" class="glass flex-1 py-2 text-sm rounded-lg text-center border border-transparent">Today</button>
    <button id="tab-badges" onclick="switchTab('badges')" class="glass flex-1 py-2 text-sm rounded-lg text-center border border-transparent">Badges</button>
    <button id="tab-history" onclick="switchTab('history')" class="glass flex-1 py-2 text-sm rounded-lg text-center border border-transparent">History</button>
    <button id="tab-programs" onclick="switchTab('programs')" class="glass flex-1 py-2 text-sm rounded-lg text-center border border-transparent">Programs</button>
  </div>

  <div id="view-today" class="px-4 py-2 slide-up">
    <div class="glass rounded-2xl p-6 text-center mb-4">
      <div id="streak-number" class="text-7xl font-black text-white mb-1"></div>
      <div class="text-red-300 text-lg font-medium mb-2">day streak</div>
      <div id="streak-label" class="text-sm text-slate-400 mb-4"></div>
      <div id="log-btn-wrap"></div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="glass-light rounded-xl p-3 text-center">
        <div id="total-reps" class="text-2xl font-bold text-white"></div>
        <div class="text-xs text-slate-400 mt-1">total reps</div>
      </div>
      <div class="glass-light rounded-xl p-3 text-center">
        <div id="best-set" class="text-2xl font-bold text-white"></div>
        <div class="text-xs text-slate-400 mt-1">best set</div>
      </div>
    </div>
    <div class="glass-light rounded-xl p-4 mb-4">
      <div class="text-xs text-slate-500 uppercase tracking-wide mb-3">7-day view</div>
      <div id="week-dots" class="flex gap-2 justify-center"></div>
    </div>
    <div class="glass-light rounded-xl p-4 mb-4">
      <div class="text-xs text-slate-500 uppercase tracking-wide mb-3">Next milestone</div>
      <div id="next-milestone" class="text-sm"></div>
    </div>
    <div id="reset-wrap" class="mt-4 hidden">
      <button onclick="confirmReset()" class="btn-danger w-full py-3 rounded-xl text-sm text-red-400">Reset streak</button>
    </div>
  </div>

  <div id="view-badges" class="px-4 py-2 slide-up hidden">
    <div class="text-xs text-slate-500 uppercase tracking-wide mb-3 px-1">Milestones</div>
    <div id="badges-grid" class="grid grid-cols-3 gap-3"></div>
  </div>

  <div id="view-history" class="px-4 py-2 slide-up hidden">
    <div class="text-xs text-slate-500 uppercase tracking-wide mb-3 px-1">13-week heatmap</div>
    <div id="heatmap" class="grid gap-1 mb-6" style="grid-template-columns: repeat(13,1fr)"></div>
    <div class="text-xs text-slate-500 uppercase tracking-wide mb-3 px-1">Session log</div>
    <div id="session-log" class="space-y-2"></div>
    <div id="no-sessions" class="text-center text-slate-500 py-8 hidden">No sessions logged yet</div>
  </div>

  <div id="view-programs" class="px-4 py-2 slide-up hidden">
    <div class="text-xs text-slate-500 uppercase tracking-wide mb-3 px-1">Challenge programs</div>
    <div id="programs-list" class="space-y-3"></div>
  </div>
</div>

<div id="log-modal" class="modal-bg hidden">
  <div class="modal-card">
    <h3 class="font-bold text-white mb-4">Log today's pushups</h3>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-slate-400 mb-1 block">Total reps today</label>
        <input id="log-reps" type="number" min="1" max="9999" placeholder="50" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
      </div>
      <div>
        <label class="text-xs text-slate-400 mb-1 block">Best single set</label>
        <input id="log-best" type="number" min="1" max="9999" placeholder="20" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
      </div>
      <div>
        <label class="text-xs text-slate-400 mb-1 block">Note (optional)</label>
        <input id="log-note" type="text" maxlength="80" placeholder="Form focus, sets, etc." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="closeLogModal()" class="flex-1 py-3 rounded-xl text-sm glass-light">Cancel</button>
      <button onclick="saveSession()" class="btn-primary flex-1 py-3 rounded-xl text-sm font-medium text-white">Log it</button>
    </div>
  </div>
</div>

<div id="reset-modal" class="modal-bg hidden">
  <div class="modal-card">
    <h3 class="font-bold text-white mb-2">Reset streak?</h3>
    <p class="text-sm text-slate-400 mb-5">Clears your current streak. History stays intact.</p>
    <div class="flex gap-3">
      <button onclick="closeResetModal()" class="flex-1 py-3 rounded-xl text-sm glass-light">Cancel</button>
      <button onclick="doReset()" class="flex-1 py-3 rounded-xl text-sm bg-red-600 text-white">Reset</button>
    </div>
  </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 glass border-t border-red-900/30 flex justify-around py-3 px-4 z-40">
  <button onclick="switchTab('today')" class="flex flex-col items-center gap-1 text-xs text-slate-400" id="nav-today"><span class="text-lg">🏠</span>Today</button>
  <button onclick="switchTab('badges')" class="flex flex-col items-center gap-1 text-xs text-slate-400" id="nav-badges"><span class="text-lg">🏆</span>Badges</button>
  <button onclick="switchTab('history')" class="flex flex-col items-center gap-1 text-xs text-slate-400" id="nav-history"><span class="text-lg">📅</span>History</button>
  <button onclick="switchTab('programs')" class="flex flex-col items-center gap-1 text-xs text-slate-400" id="nav-programs"><span class="text-lg">💪</span>Programs</button>
</nav>

<script>
const STORE_KEY = 'pushupstreak_v1';
const MILESTONES = [
  {days:1,emoji:'💪',label:'First Rep'},{days:3,emoji:'🔥',label:'3-Day Grind'},
  {days:7,emoji:'⚡',label:'One Week'},{days:14,emoji:'🦾',label:'Two Weeks'},
  {days:21,emoji:'🏋️',label:'21-Day Habit'},{days:30,emoji:'💯',label:'One Month'},
  {days:60,emoji:'🔱',label:'Two Months'},{days:90,emoji:'🥇',label:'90 Days'},
  {days:180,emoji:'🏆',label:'Half Year'},{days:365,emoji:'👑',label:'Full Year'}
];
const PROGRAMS = [
  {name:'100 Pushup Program',desc:'Progressive 6-week program. Start at your max, hit 100 consecutive by week 6. 3 days/week with rest days.',schedule:'Week 1: 3 sets. Week 2: 4 sets. Week 3-4: 5 sets. Week 5-6: max effort.'},
  {name:'30-Day Challenge',desc:'Day 1: 10 reps. Add 5 every 3 days. By day 30: 55+ reps/day.',schedule:'Days 1-3: 10 | 4-6: 15 | 7-9: 20 | 10-12: 25 | 13-15: 30 | 16-18: 35 | 19-21: 40 | 22-24: 45 | 25-27: 50 | 28-30: 55'},
  {name:'Grease the Groove',desc:'Do 50% of your max reps every hour throughout the day. Pavel Tsatsouline protocol. Fastest strength gains.',schedule:'Find max reps → set timer every 1-2 hours → do 50% max → never go to failure'},
  {name:'Fighter Pushup Program',desc:'4x per week. Builds explosive power and muscle endurance simultaneously.',schedule:'Mon: 5x20 | Wed: 4x25 | Fri: 3x30 | Sun: 1x max effort'},
];
let state = { sessions: [] };
function loadState() { try { const r = localStorage.getItem(STORE_KEY); if (r) state = JSON.parse(r); } catch(e) {} }
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function today() { return new Date().toISOString().split('T')[0]; }
function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text !== undefined) e.textContent = text; return e; }
function toast(msg) { const t = el('div', 'toast', msg); document.body.appendChild(t); setTimeout(() => t.remove(), 2100); }
function calcStreak() {
  const dates = [...new Set((state.sessions||[]).map(s=>s.date))].sort().reverse();
  if (!dates.length) return {current:0,longest:0};
  let current = 0; let d = new Date(today());
  for (let i = 0; i < 400; i++) {
    const ds = d.toISOString().split('T')[0];
    if (dates.includes(ds)) { current++; d.setDate(d.getDate()-1); }
    else if (i === 0) { d.setDate(d.getDate()-1); const ys = d.toISOString().split('T')[0]; if (!dates.includes(ys)) break; current++; d.setDate(d.getDate()-1); }
    else break;
  }
  let longest=0,run=0;
  for(let i=dates.length-1;i>=0;i--){if(i===dates.length-1){run=1;continue;} const diff=(new Date(dates[i])-new Date(dates[i+1]))/86400000; if(Math.abs(diff)===1)run++; else run=1; if(run>longest)longest=run;}
  if(run>longest)longest=run;
  return {current,longest};
}
function hasSessionToday() { return (state.sessions||[]).some(s=>s.date===today()); }
function render() {
  const {current} = calcStreak();
  document.getElementById('header-streak').textContent = current > 0 ? current + ' day streak' : 'Start today';
  document.getElementById('streak-number').textContent = current;
  document.getElementById('streak-label').textContent = current === 0 ? 'Do one set. Start the streak.' : 'Keep grinding';
  const totalReps = (state.sessions||[]).reduce((a,s)=>a+(s.reps||0),0);
  const bestSet = Math.max(0,...(state.sessions||[]).map(s=>s.best||0));
  document.getElementById('total-reps').textContent = totalReps.toLocaleString();
  document.getElementById('best-set').textContent = bestSet || '—';
  const wrap = document.getElementById('log-btn-wrap'); wrap.innerHTML = '';
  if (!hasSessionToday()) { const btn = el('button','btn-primary px-8 py-3 rounded-xl font-medium text-white text-lg','+ Log pushups'); btn.onclick = openLogModal; wrap.appendChild(btn); }
  else { const d = el('div','flex items-center justify-center gap-2 text-red-300 text-lg',''); d.appendChild(el('span','text-2xl','✓')); d.appendChild(el('span','','Done for today')); wrap.appendChild(d); }
  const nextM = MILESTONES.find(m=>m.days>current);
  const nmEl = document.getElementById('next-milestone'); nmEl.innerHTML='';
  if(nextM){ const row=el('div','flex items-center justify-between'); row.appendChild(el('span','text-slate-300 text-sm',nextM.emoji+' '+nextM.label+' ('+nextM.days+' days)')); row.appendChild(el('span','text-red-300 text-sm',(nextM.days-current)+' to go')); nmEl.appendChild(row); }
  renderWeekDots(); renderBadges(); renderHeatmap(); renderSessionLog(); renderPrograms();
  document.getElementById('reset-wrap').classList.toggle('hidden', current===0);
}
function renderWeekDots() {
  const wrap = document.getElementById('week-dots'); wrap.innerHTML='';
  const dates = new Set((state.sessions||[]).map(s=>s.date));
  const DAYS=['S','M','T','W','T','F','S'];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const ds=d.toISOString().split('T')[0]; const done=dates.has(ds); const isToday=ds===today();
    const dot=el('div','flex flex-col items-center gap-1 flex-1');
    const circle=el('div','w-8 h-8 rounded-full flex items-center justify-center text-xs '+(done?'heat-on text-white':(isToday?'border-2 border-red-400 text-red-300':'heat-off text-slate-500')));
    circle.textContent=done?'✓':DAYS[d.getDay()]; dot.appendChild(circle); dot.appendChild(el('div','text-xs text-slate-500',DAYS[d.getDay()])); wrap.appendChild(dot); }
}
function renderBadges() {
  const grid = document.getElementById('badges-grid'); grid.innerHTML='';
  const {current}=calcStreak();
  MILESTONES.forEach(m=>{ const earned=current>=m.days; const card=el('div',(earned?'badge-earned':'badge-locked')+' rounded-xl p-3 text-center'); card.appendChild(el('div','text-3xl mb-1',m.emoji)); card.appendChild(el('div','text-xs font-medium text-white',m.label)); card.appendChild(el('div','text-xs text-slate-500 mt-1',m.days+' days')); if(earned) card.appendChild(el('div','text-xs text-red-400 mt-1','Earned')); grid.appendChild(card); });
}
function renderHeatmap() {
  const hm=document.getElementById('heatmap'); hm.innerHTML='';
  const dates=new Set((state.sessions||[]).map(s=>s.date));
  const t=new Date(today());
  for(let i=90;i>=0;i--){ const d=new Date(t); d.setDate(d.getDate()-i); const ds=d.toISOString().split('T')[0]; const isToday=ds===today(); const done=dates.has(ds); hm.appendChild(el('div','rounded-sm aspect-square '+(isToday?'heat-today':(done?'heat-on':'heat-off')))); }
}
function renderSessionLog() {
  const log=document.getElementById('session-log'); const none=document.getElementById('no-sessions');
  const sessions=(state.sessions||[]).slice().reverse(); log.innerHTML='';
  if(!sessions.length){none.classList.remove('hidden');return;} none.classList.add('hidden');
  sessions.slice(0,30).forEach(s=>{ const row=el('div','glass-light rounded-xl p-3'); const top=el('div','flex items-center justify-between mb-1'); top.appendChild(el('span','text-sm font-medium text-white',(s.reps||0)+' reps'+(s.best?' (best set: '+s.best+')':""))); top.appendChild(el('span','text-xs text-slate-400',s.date)); row.appendChild(top); if(s.note){const b=el('div','text-xs text-slate-400',s.note);row.appendChild(b);} log.appendChild(row); });
}
function renderPrograms() {
  const list=document.getElementById('programs-list'); list.innerHTML='';
  PROGRAMS.forEach(p=>{ const card=el('div','glass-light rounded-xl p-4'); card.appendChild(el('div','font-medium text-white mb-1',p.name)); card.appendChild(el('div','text-sm text-slate-400 mb-2',p.desc)); card.appendChild(el('div','text-xs text-red-300 font-mono',p.schedule)); list.appendChild(card); });
}
function switchTab(tab) {
  ['today','badges','history','programs'].forEach(t=>{document.getElementById('view-'+t).classList.toggle('hidden',t!==tab);document.getElementById('tab-'+t).classList.toggle('tab-active',t===tab);document.getElementById('nav-'+t).classList.toggle('text-red-300',t===tab);document.getElementById('nav-'+t).classList.toggle('text-slate-400',t!==tab);});
}
function openLogModal() { document.getElementById('log-modal').classList.remove('hidden'); document.getElementById('log-reps').value=''; document.getElementById('log-best').value=''; document.getElementById('log-note').value=''; }
function closeLogModal() { document.getElementById('log-modal').classList.add('hidden'); }
function saveSession() {
  const reps=parseInt(document.getElementById('log-reps').value)||0;
  const best=parseInt(document.getElementById('log-best').value)||0;
  const note=document.getElementById('log-note').value.trim().slice(0,80);
  if(!reps){toast('Enter reps');return;}
  if(!state.sessions) state.sessions=[];
  const idx=state.sessions.findIndex(s=>s.date===today());
  const entry={date:today(),reps,best:best||null,note:note||null};
  if(idx>=0) state.sessions[idx]=entry; else state.sessions.push(entry);
  saveState(); closeLogModal(); render(); toast('Logged '+reps+' reps');
}
function confirmReset(){document.getElementById('reset-modal').classList.remove('hidden');}
function closeResetModal(){document.getElementById('reset-modal').classList.add('hidden');}
function doReset(){state.currentStreak=0;saveState();closeResetModal();render();toast('Streak reset');}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
loadState(); render(); switchTab('today');
</script>
</body>
