<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#0f0f1a"/>

  <!-- Subtle dot pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#1e1e32"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#dots)"/>

  <!-- Email envelope body shadow -->
  <rect x="172" y="322" width="690" height="430" rx="36" fill="#000" opacity="0.4"/>

  <!-- Email envelope body -->
  <rect x="160" y="310" width="690" height="430" rx="32" fill="#161625" stroke="#2a2a44" stroke-width="2"/>

  <!-- Envelope flap lines (V shape at top) -->
  <polyline points="160,310 505,540 850,310" fill="none" stroke="#6366f1" stroke-width="8" stroke-linejoin="round" opacity="0.9"/>

  <!-- Bottom corner fold lines -->
  <line x1="160" y1="740" x2="420" y2="530" stroke="#2a2a44" stroke-width="3"/>
  <line x1="850" y1="740" x2="600" y2="530" stroke="#2a2a44" stroke-width="3"/>

  <!-- Lightning bolt accent (speed) -->
  <path d="M 540 190 L 480 360 L 520 360 L 460 490 L 580 300 L 535 300 Z" fill="#f59e0b" opacity="0.95"/>

  <!-- Glow behind lightning -->
  <ellipse cx="510" cy="340" rx="80" ry="90" fill="#f59e0b" opacity="0.12" filter="blur(20px)"/>

  <!-- "ColdMaxx" text at bottom -->
  <text x="512" y="870" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="#6366f1" text-anchor="middle" letter-spacing="-2">ColdMaxx</text>

  <!-- Sparkle dots around envelope -->
  <circle cx="240" cy="250" r="6" fill="#818cf8" opacity="0.6"/>
  <circle cx="780" cy="230" r="4" fill="#818cf8" opacity="0.4"/>
  <circle cx="820" cy="820" r="5" fill="#6366f1" opacity="0.5"/>
  <circle cx="200" cy="810" r="4" fill="#6366f1" opacity="0.4"/>
</svg>
