<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d06a"/>
      <stop offset="100%" style="stop-color:#e8b84b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="250" cy="150" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="400" cy="60" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="700" cy="100" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="900" cy="70" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="1100" cy="120" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="150" cy="500" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="1050" cy="450" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="800" cy="550" r="2" fill="#ffffff" opacity="0.5"/>
  <!-- Crescent moon -->
  <circle cx="160" cy="315" r="120" fill="url(#moon)"/>
  <circle cx="205" cy="275" r="105" fill="#0a0a12"/>
  <!-- App name -->
  <text x="320" y="240" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#f5d06a" letter-spacing="-2">Hilal</text>
  <!-- Tagline -->
  <text x="320" y="305" font-family="-apple-system, system-ui, sans-serif" font-size="34" fill="#94a3b8" letter-spacing="0">Eid al-Fitr 2026 Date Tracker</text>
  <!-- Subtitle -->
  <text x="320" y="370" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="#64748b">Real-time Shawwal moon sighting · Community reports</text>
  <!-- Date badge -->
  <rect x="320" y="410" width="360" height="52" rx="26" fill="rgba(245,208,106,0.15)" stroke="#f5d06a" stroke-width="1.5"/>
  <text x="500" y="443" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#f5d06a" text-anchor="middle" font-weight="600">Eid Expected: March 29-31, 2026</text>
  <!-- Bottom brand -->
  <text x="600" y="590" font-family="-apple-system, system-ui, sans-serif" font-size="20" fill="#334155" text-anchor="middle">hilal-landing.surge.sh</text>
</svg>