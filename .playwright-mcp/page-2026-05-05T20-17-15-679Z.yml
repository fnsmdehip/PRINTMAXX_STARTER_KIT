      - heading "What we won't tell you" [level=2] [ref=e195]
      - paragraph [ref=e196]: Other clinics promise miracles. We don't. Here's the honest version.
    - generic [ref=e197]:
      - generic [ref=e198]:
        - generic [ref=e199]: "!"
        - generic [ref=e200]:
          - heading "TRT is not for everyone" [level=4] [ref=e201]
          - paragraph [ref=e202]: If your bloodwork comes back normal, we won't prescribe. We treat clinical hypogonadism, not vanity. Roughly 30% of consultations don't result in a prescription.
      - generic [ref=e203]:
        - generic [ref=e204]: "!"
        - generic [ref=e205]:
          - heading "Side effects exist" [level=4] [ref=e206]
          - paragraph [ref=e207]: "Potential side effects include: raised hematocrit, acne, hair thinning, testicular atrophy, mood changes, and sleep apnea worsening. Your doctor monitors for these."
      - generic [ref=e208]:
        - generic [ref=e209]: "!"
        - generic [ref=e210]:
          - heading "Fertility impact" [level=4] [ref=e211]
          - paragraph [ref=e212]: Exogenous testosterone suppresses natural production and can reduce sperm count. If you're planning children, discuss HCG co-therapy or alternative protocols first.
      - generic [ref=e213]:
        - generic [ref=e214]: "!"
        - generic [ref=e215]:
          - heading "It's a commitment" [level=4] [ref=e216]
          - paragraph [ref=e217]: Most men on TRT stay on it long-term. Stopping abruptly can cause withdrawal symptoms and temporarily lower natural production below baseline. Plan accordingly.
