        - generic [ref=e103]: Less clinical data available vs AirSense 11
      - paragraph [ref=e104]: The Luna G3 from 3B Medical offers APAP at a lower price point than ResMed or Philips. The algorithm performs adequately for most straightforward obstructive sleep apnea cases. The iCodeApnea app provides nightly AHI and leak data. For patients who cannot afford name-brand machines and do not have Medicare coverage, this is a viable option.
