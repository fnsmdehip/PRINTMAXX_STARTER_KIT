      - paragraph [ref=e92]: The ResMed AirMini is the only travel CPAP worth recommending at its size. At 10.6 oz and the footprint of a large smartphone, it fits in a carry-on or suit jacket easily. The AirMini app controls all settings and tracks sleep data. FAA-approved for use during flight when the overhead announcement permits electronic devices.
      - paragraph [ref=e93]: "The tradeoff: the humidification system (HumidX inline waterless humidifier) is less effective than a full heated tube — adequate for most, but users in very dry climates or high altitudes should note this. Best used as a dedicated travel companion to a home AirSense 11 rather than a sole machine."
