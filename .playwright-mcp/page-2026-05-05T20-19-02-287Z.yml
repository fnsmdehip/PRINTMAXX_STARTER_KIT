  - generic [ref=e159]:
    - generic [ref=e160]:
      - heading "📄 Medicare Coverage for CPAP Machines" [level=3] [ref=e161]
      - paragraph [ref=e162]:
        - strong [ref=e163]: Medicare Part B
        - text: "covers CPAP therapy for obstructive sleep apnea. Here is exactly how it works:"
      - list [ref=e164]:
        - listitem [ref=e165]:
          - strong [ref=e166]: "Step 1:"
          - text: Get a sleep study — either an in-lab polysomnography or a home sleep apnea test (HSAT). Both qualify for Medicare coverage.
        - listitem [ref=e167]:
          - strong [ref=e168]: "Step 2:"
          - text: Your doctor writes a prescription for CPAP therapy based on the study results (AHI ≥5 with symptoms, or AHI ≥15).
        - listitem [ref=e169]:
          - strong [ref=e170]: "Step 3:"
          - text: Medicare rents the CPAP machine through a Medicare-approved DME supplier for 3 months as a trial period.
        - listitem [ref=e171]:
          - strong [ref=e172]: "Step 4:"
          - text: You see your doctor within 90 days. They document that CPAP is improving your sleep apnea. Medicare then covers ongoing rental/purchase.
        - listitem [ref=e173]:
          - strong [ref=e174]: "Step 5:"
          - text: After 13 months of coverage, you own the machine.
        - listitem [ref=e175]:
          - strong [ref=e176]: "Your cost:"
          - text: 20% of the Medicare-approved amount after you meet your Part B deductible. Supplement (Medigap) or Advantage plan covers this 20%.
      - paragraph [ref=e177]:
        - strong [ref=e178]: "Tip:"
        - text: Ask your DME supplier specifically for the ResMed AirSense 11. Many default to older machines. You have the right to request the model you want within the covered category.
    - heading "AutoCPAP vs Fixed CPAP — Which Do You Need?" [level=2] [ref=e179]
    - paragraph [ref=e180]: Fixed-pressure CPAP delivers the same pressure all night — the pressure your sleep doctor set based on your titration study. It works well for patients whose apnea is predictable and consistent night to night.
    - paragraph [ref=e181]: AutoCPAP (APAP) adjusts pressure on each breath. If your pressure needs change based on sleep position, alcohol consumption, weight changes, or REM vs. non-REM sleep, APAP delivers exactly the right pressure each moment — typically resulting in lower average pressure, which most users find more comfortable.
    - generic [ref=e182]:
      - strong [ref=e183]: "What most sleep doctors now prescribe:"
      - text: APAP (auto-titrating) for most patients. It achieves equivalent AHI reduction to fixed CPAP but at lower average pressure — improving comfort and compliance. If your doctor prescribed you a fixed-pressure machine and you're struggling with comfort, ask about switching to APAP.
    - 'heading "CPAP Supplies: What You''ll Need to Buy Annually" [level=2] [ref=e184]'
    - paragraph [ref=e185]: "Beyond the machine, CPAP therapy requires regular supply replacement. Medicare covers these as well (every 3-6 months depending on the item):"
    - list [ref=e186]:
      - listitem [ref=e187]:
        - strong [ref=e188]: "Mask cushion/pillow:"
        - text: Every 2 weeks (most people replace monthly) — $8-25 each
      - listitem [ref=e189]:
        - strong [ref=e190]: "Full mask frame/headgear:"
        - text: Every 6 months — $25-60
      - listitem [ref=e191]:
        - strong [ref=e192]: "CPAP tubing:"
        - text: Every 3 months — $10-20
      - listitem [ref=e193]:
        - strong [ref=e194]: "Humidifier chamber (water tank):"
        - text: Every 6 months — $15-30
      - listitem [ref=e195]:
        - strong [ref=e196]: "CPAP filters:"
        - text: Disposable every 2-4 weeks, reusable every 6 months — $5-15/pack
    - paragraph [ref=e197]: "Annual supply cost estimate: $150-400 out-of-pocket (or covered 80% by Medicare with proper reorder schedule)."
  - generic [ref=e199]:
    - heading "Frequently Asked Questions" [level=2] [ref=e200]
    - generic [ref=e201]:
      - generic [ref=e202]: What is the best CPAP machine in 2026?
      - generic [ref=e203]: "The ResMed AirSense 11 AutoSet is the #1 CPAP machine in 2026 based on auto-titration algorithm quality, sleep data reporting, built-in heated humidification, and noise level (27dBA). It is also the most widely prescribed machine in the US, making follow-up care with sleep specialists straightforward."
    - generic [ref=e204]:
      - generic [ref=e205]: Does Medicare cover CPAP machines?
      - generic [ref=e206]: Yes — Medicare Part B covers CPAP machines after a qualifying sleep apnea diagnosis. The process involves a sleep study, prescription, 3-month trial rental through a Medicare-approved DME supplier, and a follow-up doctor visit documenting improvement. After 13 months of coverage, you own the machine. Medicare covers 80% of the approved amount; your supplement plan covers the rest.
    - generic [ref=e207]:
      - generic [ref=e208]: Is the Philips DreamStation recall still an issue?
      - generic [ref=e209]: The 2021 recall affected DreamStation 1 and some other older models due to foam degradation. The DreamStation 2, released after the recall, uses a different material and is FDA-cleared. Philips completed remediation for affected DS1 units. The DreamStation 2 is safe to purchase.
    - generic [ref=e210]:
      - generic [ref=e211]: What's the difference between CPAP and AutoCPAP?
      - generic [ref=e212]: Fixed CPAP delivers constant pressure set by your doctor. AutoCPAP (APAP) adjusts pressure breath-by-breath based on detected airway resistance. APAP typically results in lower average pressure (more comfortable) while achieving the same AHI reduction. Most sleep specialists now prescribe APAP for new patients.
    - generic [ref=e213]:
      - generic [ref=e214]: Which CPAP machine is best for travel?
      - generic [ref=e215]: The ResMed AirMini at 10.6 oz is the leading travel CPAP — FAA-approved for in-flight use. Best used alongside a home AirSense 11 rather than as a sole machine, since the waterless humidification is less robust. For frequent travelers who want one machine for home and travel, the AirSense 11 with the ResMed Power Station II battery is a viable alternative.
