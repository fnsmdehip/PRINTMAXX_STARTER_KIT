                          - paragraph [ref=e249]: So we have an old barn ended a new roof for a while. As we have livestock moving in we contacted home advisor and Roundtree responded promptly came out on a Sunday gave an estimate and based on what we had been quoted before and the knowledge they demonstrated was overwhelming against their competition. We agreed the day of the estimate and they got us in at their first available install date! Were here and gone. They even caught a discrepancy with one pack of shingles so they tore it off st their expense and replaced it before I got a chance to walk out and say anything. There quality, their honesty, and the customer service are so rare to find these days its a nice change to find a great contractor that wants a quality finish for the reasonable price!
