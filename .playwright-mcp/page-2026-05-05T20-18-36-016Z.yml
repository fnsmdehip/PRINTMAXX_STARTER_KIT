  - generic [ref=e154]:
    - heading "AI Workflow Support in 2026" [level=2] [ref=e155]
    - paragraph [ref=e156]: This is where the comparison has shifted dramatically. AI agent workflows - where Claude or GPT calls tools, loops, and makes decisions - are the biggest use case growth area right now. Let's be honest about where each tool stands.
    - heading "n8n for AI Agents" [level=3] [ref=e157]
    - paragraph [ref=e158]:
      - text: n8n has gone
      - strong [ref=e159]: all-in on AI
      - text: . The LangChain integration means you can build real AI agents that use tools, have memory, and make decisions - all visually. Built-in support for OpenAI, Anthropic Claude, Ollama (local models), and custom LLM endpoints. The AI Agent node handles tool calling natively.
    - paragraph [ref=e160]: For AI workflows, n8n is genuinely ahead by 12-18 months compared to Zapier.
    - heading "Make for AI Workflows" [level=3] [ref=e161]
    - paragraph [ref=e162]: Make has OpenAI and Claude modules. You can build prompt chains and conditional AI logic. The visual canvas makes complex prompt routing readable. But it lacks the native agent loop concept - you're stitching AI as a step, not as an orchestrator.
    - heading "Zapier for AI" [level=3] [ref=e163]
    - paragraph [ref=e164]: Zapier launched "AI Actions" and "Zapier Agents" but they remain limited compared to n8n's depth. Better for simple "summarize email → send Slack message" than for complex multi-step agent workflows.
