      - heading "How we actually detect deception" [level=2] [ref=e56]
      - paragraph [ref=e57]: No gimmicks. No random number generators. Real peer-reviewed biometric methods adapted for mobile hardware.
    - generic [ref=e58]:
      - generic [ref=e59]:
        - heading "Photoplethysmography (PPG)" [level=3] [ref=e60]
        - paragraph [ref=e61]: Your phone's camera LED illuminates blood vessels beneath the skin. As your heart beats, blood volume changes cause subtle color shifts captured at 30+ fps. We extract heart rate, HRV, and pulse transit time -- the same signals clinical polygraphs use, adapted for a phone camera sensor.
      - generic [ref=e62]:
        - heading "Vocal Micro-Tremor Analysis" [level=3] [ref=e63]
        - paragraph [ref=e64]: Under cognitive load, the muscles controlling your vocal cords exhibit involuntary micro-tremors. TruthScope's audio pipeline isolates these sub-audible patterns by analyzing fundamental frequency jitter, shimmer, and harmonic-to-noise ratio in real time using your phone's microphone.
      - generic [ref=e65]:
        - heading "AU-Coded Facial Tracking" [level=3] [ref=e66]
        - paragraph [ref=e67]: Using the Facial Action Coding System (FACS), we map 68 facial landmarks and track Action Units associated with deception -- asymmetric expressions, delayed smiles, blink-rate changes, and gaze aversion. On-device ML inference keeps all processing local and private.
