<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    padding: 60px;
    overflow: hidden;
  }
  .title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 40px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    flex: 1;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .stat-value {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-delta {
    font-size: 14px;
    color: #4ade80;
    margin-top: 4px;
  }
  .brand {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <!-- REPLACE: title, stats -->
  <div class="title">system status — last 24 hours</div>
  <div class="subtitle">autonomous agent performance dashboard</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value">27</div>
      <div class="stat-label">Active Agents</div>
      <div class="stat-delta">+6 today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">142</div>
      <div class="stat-label">Tasks Run</div>
      <div class="stat-delta">+38 vs yesterday</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">89%</div>
      <div class="stat-label">Success Rate</div>
      <div class="stat-delta">+12% this week</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">$0</div>
      <div class="stat-label">Revenue</div>
      <div class="stat-delta">soon</div>
    </div>
  </div>
  <div class="brand">PRINTMAXX</div>
</body>
</html>
