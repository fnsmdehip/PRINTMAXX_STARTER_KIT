<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 100px;
    overflow: hidden;
  }
  .quote-mark {
    font-size: 120px;
    font-weight: 900;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 0.6;
    margin-bottom: 40px;
  }
  .quote {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.4;
    text-align: center;
    max-width: 800px;
    margin-bottom: 48px;
  }
  .attribution {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .border-glow {
    position: absolute;
    top: 30px; left: 30px; right: 30px; bottom: 30px;
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="border-glow"></div>
  <div class="quote-mark">"</div>
  <div class="quote">
    <!-- REPLACE -->
    stop overthinking this. just set up the alerts and start watching.
  </div>
  <div class="attribution">PRINTMAXX</div>
</body>
</html>
