<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
  }
  .hook {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 24px;
    max-width: 900px;
  }
  .hook .highlight {
    background: linear-gradient(90deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    max-width: 700px;
    line-height: 1.5;
  }
  .brand {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .accent-bar {
    width: 60px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 2px;
    margin-bottom: 32px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="hook">
    <!-- REPLACE: Hook text here -->
    i monitor <span class="highlight">200+ competitor pages</span>. they update something, i know in 30 seconds.
  </div>
  <div class="subtitle">
    <!-- REPLACE: Subtitle/context -->
    the system that runs while you sleep
  </div>
  <div class="brand">PRINTMAXX</div>
</body>
</html>
