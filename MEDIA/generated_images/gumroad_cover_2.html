<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px;
    height: 900px;
    background: #1a1a2e;
    font-family: Arial, Helvetica, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 120px;
    overflow: hidden;
    position: relative;
  }

  /* Grid overlay */
  .grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Radial glow */
  .glow-left {
    position: absolute;
    top: 50%;
    left: -200px;
    transform: translateY(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(0,212,170,0.07) 0%, transparent 65%);
    border-radius: 50%;
  }
  .glow-right {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(100,80,220,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Price tag - top right */
  .price-tag {
    position: absolute;
    top: 0;
    right: 0;
    background: #00D4AA;
    color: #0a0a1a;
    font-size: 32px;
    font-weight: 900;
    padding: 20px 50px 20px 40px;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 15% 50%);
    letter-spacing: 1px;
  }

  /* Revenue headline - huge */
  .revenue {
    font-size: 130px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -4px;
    color: #ffffff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .revenue .per {
    font-size: 40px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0;
    vertical-align: super;
    margin-left: 8px;
  }

  /* FULL FUNNEL TEARDOWN */
  .product-title {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00D4AA;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 3px;
    background: #00D4AA;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  /* Description */
  .description {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    max-width: 700px;
    line-height: 1.65;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 1;
  }
  .stat-item {
    border-left: 2px solid rgba(0,212,170,0.2);
    padding: 0 40px;
  }
  .stat-item:first-child {
    border-left: none;
    padding-left: 0;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 44px;
    right: 80px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.1);
    letter-spacing: 5px;
    text-transform: uppercase;
    z-index: 1;
  }

  /* Left accent bar */
  .left-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, #00D4AA 0%, #0057ff 100%);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="left-bar"></div>
  <div class="price-tag">$7</div>

  <div class="revenue">$70K<span class="per">/mo</span></div>
  <div class="product-title">Full Funnel Teardown</div>
  <div class="divider"></div>
  <div class="description">12 reverse-engineered funnels from indie products doing $70K+ per month. Every page. Every upsell. Every hook. Documented.</div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value">12</div>
      <div class="stat-label">Funnels</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">47</div>
      <div class="stat-label">Pages Mapped</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">$1M+</div>
      <div class="stat-label">Revenue Studied</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">$7</div>
      <div class="stat-label">Price</div>
    </div>
  </div>

  <div class="brand">PRINTMAXX</div>
</body>
</html>
