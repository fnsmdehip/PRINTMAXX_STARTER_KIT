<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #09090b 0%, #111113 50%, #09090b 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #e4e4e7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--color-a), var(--color-b));
  }
  .vs-badge {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .versus {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 32px;
  }
  .product {
    text-align: center;
  }
  .product-name {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.1;
  }
  .product-name.a { color: var(--color-a); }
  .product-name.b { color: var(--color-b); }
  .product-sub {
    font-size: 18px;
    color: #71717a;
    margin-top: 8px;
  }
  .vs-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #18181b;
    border: 2px solid #27272a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #71717a;
    flex-shrink: 0;
  }
  .tagline {
    font-size: 20px;
    color: #71717a;
    max-width: 700px;
    text-align: center;
    line-height: 1.5;
  }
  .brand {
    position: absolute;
    bottom: 40px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.15);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .year {
    position: absolute;
    top: 24px;
    right: 40px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body style="--color-a: #5046e4; --color-b: #ff6b6b;">
<div class="top-bar"></div>
<div class="year">2026 COMPARISON</div>
<div class="vs-badge">honest tool comparison</div>
<div class="versus">
  <div class="product">
    <div class="product-name a">Instantly</div>
    <div class="product-sub">$30/mo volume</div>
  </div>
  <div class="vs-circle">vs</div>
  <div class="product">
    <div class="product-name b">Lemlist</div>
    <div class="product-sub">$59/mo personalization</div>
  </div>
</div>
<div class="tagline">Volume vs personalization. Which cold email tool actually wins?</div>
<div class="brand">PRINTMAXX</div>
</body>
</html>
