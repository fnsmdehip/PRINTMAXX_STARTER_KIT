<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px;
    height: 900px;
    background: #00D4AA;
    font-family: Arial, Helvetica, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 100px 120px;
    overflow: hidden;
    position: relative;
  }

  /* Geometric background shapes */
  .bg-circle-1 {
    position: absolute;
    top: -180px;
    right: -180px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .bg-circle-2 {
    position: absolute;
    bottom: -120px;
    right: 200px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .bg-circle-3 {
    position: absolute;
    bottom: 60px;
    left: -80px;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
  }

  /* FREE badge */
  .badge {
    position: absolute;
    top: 60px;
    right: 80px;
    background: #ffffff;
    color: #00D4AA;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 14px 28px;
    border-radius: 8px;
    text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }

  /* Category label */
  .category {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .category::before {
    content: '';
    display: inline-block;
    width: 32px;
    height: 2px;
    background: rgba(255,255,255,0.5);
  }

  /* Main number */
  .big-number {
    font-size: 160px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -8px;
    color: #ffffff;
    margin-bottom: 0;
    position: relative;
    z-index: 1;
  }

  /* Headline */
  .headline {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.15;
    color: #ffffff;
    margin-bottom: 32px;
    max-width: 820px;
    position: relative;
    z-index: 1;
  }
  .headline .dark {
    color: rgba(0,60,50,0.6);
  }

  /* Sub text */
  .subtext {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    max-width: 680px;
    line-height: 1.5;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  /* Stat chips */
  .chips {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .chip {
    background: rgba(0,0,0,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 100px;
    backdrop-filter: blur(4px);
  }

  /* Branding */
  .brand {
    position: absolute;
    bottom: 50px;
    right: 80px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(0,60,50,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-circle-3"></div>
  <div class="badge">FREE</div>

  <div class="category">Lead Magnet</div>

  <div class="big-number">5</div>
  <div class="headline">AI Prompts That <span class="dark">Save 2 Hours</span> Per Week</div>
  <div class="subtext">Copy-paste ready. No setup. Works in ChatGPT, Claude, or Gemini. Start saving time today.</div>

  <div class="chips">
    <div class="chip">Works immediately</div>
    <div class="chip">2 hrs saved / week</div>
    <div class="chip">No AI experience needed</div>
  </div>

  <div class="brand">PRINTMAXX</div>
  <div class="bottom-bar"></div>
</body>
</html>
