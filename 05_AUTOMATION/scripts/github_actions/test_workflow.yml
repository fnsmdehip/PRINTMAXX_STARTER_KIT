# PRINTMAXX Test Workflow
# Runs automated tests on push and pull requests

name: PRINTMAXX Test Suite

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'AUTOMATIONS/**'
      - 'LANDING/**'
      - '.github/workflows/test_workflow.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'AUTOMATIONS/**'
      - 'LANDING/**'
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run (all, social, app, proxy)'
        required: false
        default: 'all'
      run_integration:
        description: 'Run integration tests'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Unit Tests - Fast feedback
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytest pytest-cov requests
          playwright install chromium --with-deps

      - name: Run unit tests
        working-directory: AUTOMATIONS
        run: |
          python bulk_test_runner.py --suite ${{ github.event.inputs.test_suite || 'all' }} \
            --workers 4 \
            --output test_results.json

      - name: Generate test report
        if: always()
        working-directory: AUTOMATIONS
        run: |
          python test_report_generator.py \
            --input test_results.json \
            --format html \
            --output test_report.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            AUTOMATIONS/test_results.json
            AUTOMATIONS/test_report.html
          retention-days: 30

      - name: Update badge
        if: github.ref == 'refs/heads/main'
        working-directory: AUTOMATIONS
        run: |
          python test_report_generator.py \
            --input test_results.json \
            --format badge \
            --output badge.json

  # ============================================================
  # Lint and Type Check
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          pip install flake8 mypy black isort

      - name: Run Black (format check)
        run: |
          black --check --diff AUTOMATIONS/

      - name: Run isort (import check)
        run: |
          isort --check-only --diff AUTOMATIONS/

      - name: Run Flake8 (lint)
        run: |
          flake8 AUTOMATIONS/ --max-line-length=120 --ignore=E501,W503

      - name: Run MyPy (type check)
        run: |
          mypy AUTOMATIONS/ --ignore-missing-imports --no-error-summary || true

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit (security linter)
        run: |
          bandit -r AUTOMATIONS/ -ll --skip B101 || true

      - name: Check for secrets
        run: |
          # Simple check for common secret patterns
          ! grep -rE "(api_key|apikey|secret|password|token)\s*=\s*['\"][^'\"]{8,}" AUTOMATIONS/ \
            --include="*.py" \
            | grep -v "test_" \
            | grep -v "#" || true

  # ============================================================
  # Landing Site Tests
  # ============================================================
  landing-tests:
    name: Landing Site Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: LANDING/printmaxx-site/package-lock.json

      - name: Install dependencies
        working-directory: LANDING/printmaxx-site
        run: npm ci

      - name: Run lint
        working-directory: LANDING/printmaxx-site
        run: npm run lint || true

      - name: Run type check
        working-directory: LANDING/printmaxx-site
        run: npm run type-check || true

      - name: Build site
        working-directory: LANDING/printmaxx-site
        run: npm run build

      - name: Run tests
        working-directory: LANDING/printmaxx-site
        run: npm test || true

  # ============================================================
  # Integration Tests (Manual trigger only)
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.run_integration == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install playwright pytest requests
          playwright install chromium --with-deps

      - name: Run integration tests
        working-directory: AUTOMATIONS
        env:
          RUN_INTEGRATION_TESTS: 'true'
          # Note: Session paths would need to be set up with secrets
          # X_SESSION_PATH: ${{ secrets.X_SESSION_PATH }}
          # IG_SESSION_PATH: ${{ secrets.IG_SESSION_PATH }}
        run: |
          python bulk_test_runner.py --suite social \
            --workers 2 \
            --timeout 600 \
            --output integration_results.json

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: AUTOMATIONS/integration_results.json
          retention-days: 30

  # ============================================================
  # Summary Job
  # ============================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, lint, security, landing-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check unit test results
          if [ -f artifacts/unit-test-results/test_results.json ]; then
            passed=$(jq -r '.passed' artifacts/unit-test-results/test_results.json)
            failed=$(jq -r '.failed' artifacts/unit-test-results/test_results.json)
            total=$(jq -r '.total_tests' artifacts/unit-test-results/test_results.json)

            echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
            echo "- Total: $total" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $passed" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Landing Tests | ${{ needs.landing-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: needs.unit-tests.result == 'failure' || needs.lint.result == 'failure'
        run: |
          echo "Tests failed!"
          exit 1

  # ============================================================
  # Notify on Failure (Optional)
  # ============================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Create issue for test failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Test Failure: ${context.workflow} - ${new Date().toISOString().split('T')[0]}`;
            const body = `
            ## Test Failure Detected

            **Workflow:** ${context.workflow}
            **Run:** ${context.runId}
            **Commit:** ${context.sha}

            [View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            Please investigate and fix the failing tests.
            `;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure'
            });

            const existingIssue = issues.data.find(i => i.title.startsWith('Test Failure:'));

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['test-failure', 'automated']
              });
            }
