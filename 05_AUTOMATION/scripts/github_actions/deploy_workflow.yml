# PRINTMAXX Deploy Workflow
# Handles deployment to various environments

name: PRINTMAXX Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'LANDING/printmaxx-site/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip test suite'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # Pre-deploy Checks
  # ============================================================
  pre-deploy:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      environment: ${{ steps.check.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: check
        run: |
          # Determine deployment environment
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

          echo "should_deploy=true" >> $GITHUB_OUTPUT

      - name: Check for deploy blockers
        run: |
          # Check for BLOCKED files
          if ls OPS/logs/BLOCKED_*.md 2>/dev/null; then
            echo "::warning::Found BLOCKED files. Review before deploying."
          fi

          # Check for required files
          if [ ! -f LANDING/printmaxx-site/package.json ]; then
            echo "::error::package.json not found"
            exit 1
          fi

  # ============================================================
  # Run Tests (unless skipped)
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: github.event.inputs.skip_tests != 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: LANDING/printmaxx-site/package-lock.json

      - name: Install Python dependencies
        run: |
          pip install playwright pytest requests
          playwright install chromium --with-deps

      - name: Install Node dependencies
        working-directory: LANDING/printmaxx-site
        run: npm ci

      - name: Run Python tests
        working-directory: AUTOMATIONS
        run: |
          python bulk_test_runner.py --suite all --workers 4 --output pre_deploy_results.json
        continue-on-error: true

      - name: Run Node tests
        working-directory: LANDING/printmaxx-site
        run: npm test || true

      - name: Build site
        working-directory: LANDING/printmaxx-site
        run: npm run build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-test-results
          path: AUTOMATIONS/pre_deploy_results.json
          retention-days: 7

  # ============================================================
  # Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [pre-deploy, test]
    if: always() && needs.pre-deploy.outputs.should_deploy == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: LANDING/printmaxx-site/package-lock.json

      - name: Install dependencies
        working-directory: LANDING/printmaxx-site
        run: npm ci

      - name: Build for production
        working-directory: LANDING/printmaxx-site
        env:
          NODE_ENV: production
          NEXT_PUBLIC_ENVIRONMENT: ${{ needs.pre-deploy.outputs.environment }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            LANDING/printmaxx-site/.next
            LANDING/printmaxx-site/public
          retention-days: 7

  # ============================================================
  # Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy, build]
    if: needs.pre-deploy.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.printmaxx.io
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: LANDING/printmaxx-site

      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: LANDING/printmaxx-site
          # Don't promote to production
          vercel-args: '--env NODE_ENV=staging'

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test commands here
          # curl -f https://staging.printmaxx.io/api/health || exit 1

      - name: Notify deployment
        run: |
          echo "Staging deployment complete!"
          echo "URL: https://staging.printmaxx.io"

  # ============================================================
  # Deploy to Production
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy, build]
    if: needs.pre-deploy.outputs.environment == 'production'
    environment:
      name: production
      url: https://printmaxx.io
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: LANDING/printmaxx-site

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: LANDING/printmaxx-site
          vercel-args: '--prod'

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          # curl -f https://printmaxx.io/api/health || exit 1

      - name: Create deployment record
        run: |
          echo "Production deployment complete!"
          echo "URL: https://printmaxx.io"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ============================================================
  # Post-deploy Verification
  # ============================================================
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install playwright requests

      - name: Run E2E verification
        run: |
          echo "Running E2E verification tests..."
          # Add E2E test commands here

      - name: Check critical endpoints
        run: |
          # Health check
          echo "Checking health endpoints..."
          # curl -sf https://printmaxx.io || echo "Health check warning"

      - name: Generate deployment report
        run: |
          echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.pre-deploy.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: ${{ needs.deploy-staging.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production: ${{ needs.deploy-production.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Rollback (Manual trigger)
  # ============================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'workflow_dispatch'
    needs: [deploy-production]
    environment:
      name: production
      url: https://printmaxx.io

    steps:
      - name: Rollback deployment
        run: |
          echo "::warning::Deployment failed. Initiating rollback..."
          # Add rollback commands here
          # vercel rollback --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Rollback: ${new Date().toISOString().split('T')[0]}`,
              body: `
              ## Deployment Rollback

              A deployment failed and was rolled back.

              **Workflow Run:** ${context.runId}
              **Commit:** ${context.sha}

              Please investigate the failure.
              `,
              labels: ['deployment', 'rollback', 'urgent']
            });

  # ============================================================
  # Notify
  # ============================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [verify]
    if: always()

    steps:
      - name: Notify success
        if: needs.verify.result == 'success'
        run: |
          echo "Deployment successful!"
          # Add Slack/Discord notification here

      - name: Notify failure
        if: needs.verify.result == 'failure'
        run: |
          echo "::error::Deployment verification failed!"
          # Add alert notification here
