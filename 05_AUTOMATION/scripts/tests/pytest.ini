[pytest]
# PRINTMAXX Automation Test Suite Configuration
# =============================================

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --ignore=test_output
    --ignore=reports

# Markers
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_browser: marks tests that require a real browser
    unit: marks tests as unit tests

# Timeout settings (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Coverage settings (requires pytest-cov)
# Use --cov flag to enable

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_output/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning

# Console output
console_output_style = progress

# JUnit XML report (for CI/CD)
junit_family = xunit2
junit_suite_name = PRINTMAXX_Automation_Tests

# Environment variables for tests
env =
    TESTING=true

# Parallel execution settings (requires pytest-xdist)
# Use -n auto for automatic worker detection
# Use -n 4 for 4 parallel workers

# HTML report settings (requires pytest-html)
# Use --html=reports/report.html --self-contained-html
