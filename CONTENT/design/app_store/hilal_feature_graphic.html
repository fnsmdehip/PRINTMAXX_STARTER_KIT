<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hilal — Feature Graphic 1024x500</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; }
  .graphic {
    width: 1024px; height: 500px;
    background: linear-gradient(135deg, #1B5E20 0%, #0A2E10 60%, #042E04 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center; padding: 0 80px;
  }
  .graphic .geo-pattern {
    position: absolute; inset: 0; opacity: 0.06;
    background-image:
      repeating-conic-gradient(rgba(255,255,255,0.5) 0% 25%, transparent 0% 50%) 0 0 / 60px 60px;
  }
  .left { position: relative; z-index: 1; flex: 1; }
  .left h1 {
    font-family: 'Playfair Display', serif; font-size: 56px; color: #FFFFFF;
    line-height: 1.15; margin-bottom: 16px;
  }
  .left h1 span { color: #A5D6A7; }
  .left p { font-family: 'Inter', sans-serif; font-size: 20px; color: rgba(255,255,255,0.6); max-width: 400px; }
  .right { position: relative; z-index: 1; }
  .icon-preview {
    width: 160px; height: 160px; border-radius: 36px;
    background: linear-gradient(135deg, #1B5E20, #2E7D32);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    font-size: 80px; color: #FFFFFF;
  }
  .badge {
    position: absolute; bottom: 40px; right: 80px;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="graphic">
  <div class="geo-pattern"></div>
  <div class="left">
    <h1>Track the <span>Hilal</span></h1>
    <p>Islamic calendar, moon sighting tracker, and prayer companion for the faithful.</p>
  </div>
  <div class="right">
    <div class="icon-preview">&#9790;</div>
  </div>
  <div class="badge">PRINTMAXX</div>
</div>
</body>
</html>
