<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FocusLock — Feature Graphic 1024x500</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; }
  .graphic {
    width: 1024px; height: 500px;
    background: linear-gradient(135deg, #E65100 0%, #BF360C 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center; padding: 0 80px;
  }
  .crosshair {
    position: absolute; width: 300px; height: 300px;
    border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
    right: 250px; top: 50%; transform: translateY(-50%);
  }
  .crosshair::before, .crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.1);
  }
  .crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  .crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  .left { position: relative; z-index: 1; flex: 1; }
  .left h1 {
    font-family: 'Oswald', sans-serif; font-size: 60px; color: #FFFFFF;
    text-transform: uppercase; letter-spacing: 4px; margin-bottom: 16px;
  }
  .left p { font-family: 'Inter', sans-serif; font-size: 20px; color: rgba(255,255,255,0.7); max-width: 380px; }
  .right { position: relative; z-index: 1; }
  .icon-preview {
    width: 160px; height: 160px; border-radius: 36px;
    background: linear-gradient(135deg, #E65100, #FF8F00);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    font-size: 64px; color: #FFF;
  }
  .badge {
    position: absolute; bottom: 40px; right: 80px;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="graphic">
  <div class="crosshair"></div>
  <div class="left">
    <h1>Lock Your Focus</h1>
    <p>Block distractions, lock your screen, and reclaim your deep work time.</p>
  </div>
  <div class="right">
    <div class="icon-preview">&#8982;</div>
  </div>
  <div class="badge">PRINTMAXX</div>
</div>
</body>
</html>
